<!-- ============================================================
     VIBECANO — FLOATING WHATSAPP CHAT
     Paste this WHOLE file into Elementor Theme Builder → Footer → HTML widget
     (or a global HTML widget that loads on all pages).

     Works on every page. Moves up automatically on checkout mobile bar.

     Confirm: data-vc-wa-version="1.0" on #vcWhatsAppFloat
     ============================================================ -->
<style>
  .vc-wa-float {
    position: fixed;
    right: max(18px, env(safe-area-inset-right, 0px));
    bottom: max(20px, env(safe-area-inset-bottom, 0px));
    z-index: 99980;
    line-height: 0;
    pointer-events: none;
  }

  .vc-wa-float-btn {
    pointer-events: auto;
    display: grid;
    place-items: center;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: linear-gradient(145deg, #2bd46a 0%, #25d366 52%, #1ebe57 100%);
    color: #fff;
    box-shadow:
      0 14px 34px -12px rgba(37, 211, 102, 0.72),
      0 8px 18px -10px rgba(0, 0, 0, 0.28);
    transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.22s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .vc-wa-float-btn:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow:
      0 18px 40px -12px rgba(37, 211, 102, 0.82),
      0 10px 22px -10px rgba(0, 0, 0, 0.32);
  }

  .vc-wa-float-btn:active {
    transform: translateY(-1px) scale(1.01);
  }

  .vc-wa-float-btn svg {
    width: 30px;
    height: 30px;
    display: block;
  }

  .vc-wa-float-tip {
    pointer-events: none;
    position: absolute;
    right: calc(100% + 12px);
    top: 50%;
    transform: translateY(-50%) translateX(6px);
    opacity: 0;
    white-space: nowrap;
    padding: 8px 12px;
    border-radius: 999px;
    background: #111;
    color: #fff;
    font: 600 12px/1.2 "Segoe UI", system-ui, sans-serif;
    box-shadow: 0 10px 24px -16px rgba(0, 0, 0, 0.55);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .vc-wa-float:hover .vc-wa-float-tip,
  .vc-wa-float:focus-within .vc-wa-float-tip {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
  }

  /* Checkout page: sit above sticky Place Order bar */
  body:has(#vcCheckoutMobileBar.is-active) .vc-wa-float,
  body:has(.vc-checkout-mobile-bar.is-active) .vc-wa-float {
    bottom: calc(84px + env(safe-area-inset-bottom, 0px));
  }

  @media (max-width: 640px) {
    .vc-wa-float-btn {
      width: 54px;
      height: 54px;
    }

    .vc-wa-float-btn svg {
      width: 28px;
      height: 28px;
    }

    .vc-wa-float-tip {
      display: none;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .vc-wa-float-btn,
    .vc-wa-float-tip {
      transition: none !important;
    }
  }
</style>

<div class="vc-wa-float" id="vcWhatsAppFloat" data-vc-wa-version="1.0">
  <a
    class="vc-wa-float-btn"
    id="vcWhatsAppFloatBtn"
    href="https://wa.me/923332929254?text=Hi%20Vibecano%2C%20I%20need%20help%20with..."
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Chat with Vibecano on WhatsApp"
  >
    <span class="vc-wa-float-tip" aria-hidden="true">Chat with us</span>
    <svg viewBox="0 0 32 32" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="M16.01 2.667c-7.364 0-13.344 5.979-13.344 13.343 0 2.353.615 4.658 1.784 6.686L2.667 29.333l6.828-1.724a13.28 13.28 0 0 0 6.515 1.667h.005c7.364 0 13.343-5.98 13.343-13.344C29.358 8.646 23.378 2.667 16.01 2.667zm0 24.01h-.004a11.02 11.02 0 0 1-5.617-1.536l-.403-.24-4.052 1.026 1.082-3.953-.262-.406a11.01 11.01 0 0 1-1.69-5.858c0-6.094 4.958-11.052 11.056-11.052 2.954 0 5.73 1.15 7.817 3.24a10.98 10.98 0 0 1 3.233 7.812c0 6.094-4.958 11.052-11.06 11.052zm6.07-8.276c-.333-.167-1.969-.972-2.274-1.083-.305-.11-.527-.167-.749.167-.222.333-.86 1.083-1.055 1.305-.194.222-.389.25-.722.083-.333-.167-1.405-.518-2.676-1.65-.99-.882-1.658-1.972-1.852-2.305-.194-.333-.02-.513.146-.679.15-.149.333-.389.5-.583.167-.194.222-.333.333-.556.111-.222.056-.417-.028-.583-.083-.167-.749-1.805-1.026-2.472-.27-.64-.544-.553-.749-.563l-.638-.011c-.222 0-.583.083-.889.417-.305.333-1.166 1.14-1.166 2.78 0 1.64 1.194 3.226 1.361 3.448.167.222 2.35 3.587 5.694 5.03.795.343 1.416.548 1.899.702.798.254 1.525.218 2.1.132.64-.096 1.969-.805 2.247-1.583.278-.778.278-1.444.194-1.583-.083-.139-.305-.222-.638-.389z"/>
    </svg>
  </a>
</div>

<script>
(function () {
  "use strict";

  var PHONE = "923332929254";
  var DEFAULT_TEXT = "Hi Vibecano, I need help with...";
  var root = document.getElementById("vcWhatsAppFloat");
  var btn = document.getElementById("vcWhatsAppFloatBtn");

  if (!root || !btn) return;

  btn.href = "https://wa.me/" + PHONE + "?text=" + encodeURIComponent(DEFAULT_TEXT);

  if (root.parentNode !== document.body) {
    document.body.appendChild(root);
  }
})();
</script>
