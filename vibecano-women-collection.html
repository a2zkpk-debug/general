<!-- ============================================================
     VIBECANO — WOMEN COLLECTION (Premium fashion grid)
     Paste this whole file into a single Elementor HTML widget.

     WHAT IT DOES
     • Pulls live products from WooCommerce (Store API) for the "women"
       category and its subcategories.
     • Premium fashion card: image (+ hover second image), wishlist,
       discount badge, name, sale/regular price, and a bottom hover panel
       with size selection + Add to Cart.
     • Real Add to Cart via the WooCommerce Store API with a premium
       "Added to cart" mini popup (no default alerts).

     COMPATIBILITY
     • Uses the same Store API cart pattern as the rest of the site
       (Nonce + Cart-Token in sessionStorage key "vcWcCartToken").
     • No Bootstrap / Tailwind / React / Vue / jQuery. Vanilla JS only.

     CUSTOMIZE FAST
     • Category / URLs / per-page  -> see CONFIG at the top of <script>.
     • Colors / spacing / radius   -> see the ":root-like" tokens in .vc-wf-wrap.
     ============================================================ -->

<!-- Brand typography (matches the rest of the VibeCano templates) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<style>
  /* -----------------------------------------------------------------
     1) DESIGN TOKENS
     ----------------------------------------------------------------- */
  .vc-wf-wrap {
    --wf-ink: #141418;
    --wf-ink-2: #3c3c44;
    --wf-muted: #8a8a93;
    --wf-line: rgba(20, 20, 24, 0.10);
    --wf-bg: #ffffff;
    --wf-soft: #f4f2ef;          /* warm image backdrop */
    --wf-sale: #c0392b;          /* sale price accent    */
    --wf-radius: 16px;
    --wf-gap: 22px;
    --wf-shadow: 0 14px 34px -24px rgba(20, 20, 24, 0.55);
    --wf-shadow-hover: 0 30px 60px -28px rgba(20, 20, 24, 0.55);
    --wf-ease: cubic-bezier(0.22, 1, 0.36, 1);

    box-sizing: border-box;
    max-width: 1400px;
    margin: 0 auto;
    padding: 64px 22px 76px;
    color: var(--wf-ink);
    background: var(--wf-bg);
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .vc-wf-wrap *,
  .vc-wf-wrap *::before,
  .vc-wf-wrap *::after { box-sizing: border-box; }

  /* -----------------------------------------------------------------
     2) SECTION HEADER
     ----------------------------------------------------------------- */
  .vc-wf-head {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 34px;
  }
  .vc-wf-head-text { max-width: 640px; }

  .vc-wf-label {
    display: inline-block;
    margin-bottom: 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--wf-muted);
  }
  .vc-wf-title {
    margin: 0;
    font-family: Manrope, Inter, sans-serif;
    font-size: clamp(30px, 4.6vw, 50px);
    font-weight: 800;
    line-height: 1.02;
    letter-spacing: -0.03em;
  }
  .vc-wf-sub {
    margin: 14px 0 0;
    color: var(--wf-muted);
    font-size: 15px;
    line-height: 1.65;
  }

  .vc-wf-viewall {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 13px 24px;
    border: 1px solid var(--wf-ink);
    border-radius: 999px;
    background: transparent;
    color: var(--wf-ink);
    font-family: Manrope, Inter, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-decoration: none;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background 0.35s var(--wf-ease), color 0.35s var(--wf-ease), transform 0.35s var(--wf-ease);
  }
  .vc-wf-viewall svg { width: 15px; height: 15px; transition: transform 0.35s var(--wf-ease); }
  .vc-wf-viewall:hover,
  .vc-wf-viewall:focus-visible {
    background: var(--wf-ink);
    color: #fff;
    transform: translateY(-2px);
  }
  .vc-wf-viewall:hover svg,
  .vc-wf-viewall:focus-visible svg { transform: translateX(4px); }

  /* -----------------------------------------------------------------
     3) TOOLBAR (category filters + sort) — minimal, optional controls
     ----------------------------------------------------------------- */
  .vc-wf-toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 30px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--wf-line);
  }
  .vc-wf-chips { display: flex; flex-wrap: wrap; gap: 8px; min-width: 0; }
  .vc-wf-chip {
    border: 0;
    border-radius: 999px;
    padding: 9px 16px;
    background: transparent;
    color: var(--wf-muted);
    cursor: pointer;
    font-family: Manrope, Inter, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: background 0.25s var(--wf-ease), color 0.25s var(--wf-ease);
  }
  .vc-wf-chip:hover,
  .vc-wf-chip:focus-visible { background: rgba(20, 20, 24, 0.06); color: var(--wf-ink); }
  .vc-wf-chip.is-active { background: var(--wf-ink); color: #fff; }

  .vc-wf-sort {
    min-width: 180px;
    padding: 10px 38px 10px 14px;
    border: 1px solid var(--wf-line);
    border-radius: 999px;
    background: #fff
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%238a8a93' d='M1.41.59 6 5.17 10.59.59 12 2l-6 6-6-6z'/></svg>")
      no-repeat right 14px center;
    color: var(--wf-ink);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    font-family: Inter, sans-serif;
    font-size: 13px;
    font-weight: 600;
  }

  /* -----------------------------------------------------------------
     4) GRID
     ----------------------------------------------------------------- */
  .vc-wf-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: var(--wf-gap);
  }

  /* -----------------------------------------------------------------
     5) PRODUCT CARD
     ----------------------------------------------------------------- */
  .vc-wf-card {
    display: flex;
    flex-direction: column;
    min-width: 0;
    /* Scroll entrance state (revealed via JS .is-visible) */
    opacity: 0;
    transform: translateY(26px);
    transition: transform 0.6s var(--wf-ease), opacity 0.6s var(--wf-ease);
    transition-delay: calc(var(--i, 0) * 70ms);
  }
  .vc-wf-card.is-visible { opacity: 1; transform: translateY(0); }

  .vc-wf-media {
    position: relative;
    overflow: hidden;
    aspect-ratio: 3 / 4;
    border-radius: var(--wf-radius);
    background: var(--wf-soft);
    box-shadow: var(--wf-shadow);
    transition: box-shadow 0.4s var(--wf-ease), transform 0.4s var(--wf-ease);
  }
  .vc-wf-card:hover .vc-wf-media,
  .vc-wf-card:focus-within .vc-wf-media {
    box-shadow: var(--wf-shadow-hover);
    transform: translateY(-6px);
  }

  .vc-wf-media-link { display: block; width: 100%; height: 100%; }

  .vc-wf-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.7s var(--wf-ease), opacity 0.6s var(--wf-ease);
    will-change: transform;
  }
  .vc-wf-img--secondary { opacity: 0; }               /* second image (hover) */
  .vc-wf-card:hover .vc-wf-img--primary,
  .vc-wf-card:focus-within .vc-wf-img--primary { transform: scale(1.07); }
  .vc-wf-card:hover .vc-wf-img--secondary,
  .vc-wf-card:focus-within .vc-wf-img--secondary { opacity: 1; transform: scale(1.07); }

  /* Discount badge */
  .vc-wf-badge {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 3;
    padding: 6px 11px;
    border-radius: 999px;
    background: var(--wf-ink);
    color: #fff;
    font-family: Manrope, Inter, sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.04em;
  }

  /* Wishlist */
  .vc-wf-wish {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border: 0;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.92);
    color: var(--wf-ink);
    cursor: pointer;
    box-shadow: 0 8px 20px -12px rgba(20, 20, 24, 0.8);
    transition: transform 0.25s var(--wf-ease), background 0.25s var(--wf-ease), color 0.25s var(--wf-ease);
  }
  .vc-wf-wish svg { width: 19px; height: 19px; }
  .vc-wf-wish:hover,
  .vc-wf-wish:focus-visible { transform: scale(1.08); background: #fff; }
  .vc-wf-wish.is-active { background: var(--wf-ink); color: #fff; }
  .vc-wf-wish.is-active svg { fill: #fff; }

  /* Bottom hover panel: size + Add to Cart (no layout shift; overlays image) */
  .vc-wf-panel {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 14px 14px 16px;
    background: linear-gradient(to top, #fff 82%, rgba(255, 255, 255, 0));
    transform: translateY(102%);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.42s var(--wf-ease), opacity 0.42s var(--wf-ease);
  }
  .vc-wf-card:hover .vc-wf-panel,
  .vc-wf-card:focus-within .vc-wf-panel {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  .vc-wf-sizes {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .vc-wf-sizes.is-shake { animation: vc-wf-shake 0.4s var(--wf-ease); }

  .vc-wf-size {
    min-width: 34px;
    padding: 7px 10px;
    border: 1px solid var(--wf-line);
    border-radius: 999px;
    background: #fff;
    color: var(--wf-ink);
    cursor: pointer;
    font-family: Manrope, Inter, sans-serif;
    font-size: 12px;
    font-weight: 700;
    line-height: 1;
    transition: background 0.2s var(--wf-ease), color 0.2s var(--wf-ease), border-color 0.2s var(--wf-ease);
  }
  .vc-wf-size:hover,
  .vc-wf-size:focus-visible { border-color: var(--wf-ink); }
  .vc-wf-size.is-selected {
    background: var(--wf-ink);
    color: #fff;
    border-color: var(--wf-ink);
  }

  .vc-wf-add {
    width: 100%;
    padding: 12px 14px;
    border: 0;
    border-radius: 11px;
    background: var(--wf-ink);
    color: #fff;
    cursor: pointer;
    font-family: Manrope, Inter, sans-serif;
    font-size: 12.5px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: transform 0.25s var(--wf-ease), box-shadow 0.25s var(--wf-ease), opacity 0.25s var(--wf-ease);
  }
  .vc-wf-add:hover,
  .vc-wf-add:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 16px 26px -16px rgba(20, 20, 24, 0.9);
  }
  .vc-wf-add:disabled { opacity: 0.7; cursor: wait; transform: none; box-shadow: none; }

  /* Card info */
  .vc-wf-info {
    padding: 15px 4px 0;
    text-align: center;
  }
  .vc-wf-name {
    display: -webkit-box;
    overflow: hidden;
    margin: 0 0 8px;
    color: var(--wf-ink);
    font-size: 14.5px;
    font-weight: 600;
    line-height: 1.4;
    letter-spacing: 0.01em;
    text-decoration: none;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    transition: color 0.25s var(--wf-ease);
  }
  .vc-wf-name:hover,
  .vc-wf-name:focus-visible { color: var(--wf-ink-2); text-decoration: underline; text-underline-offset: 3px; }

  .vc-wf-price {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: center;
    gap: 8px;
    font-family: Manrope, Inter, sans-serif;
  }
  .vc-wf-now { font-size: 16px; font-weight: 800; color: var(--wf-ink); }
  .vc-wf-was { font-size: 13px; font-weight: 600; color: var(--wf-muted); text-decoration: line-through; }
  .vc-wf-off { font-size: 12px; font-weight: 800; color: var(--wf-sale); }
  .vc-wf-price.is-sale .vc-wf-now { color: var(--wf-sale); }

  /* -----------------------------------------------------------------
     6) LOADING SKELETON + MESSAGES
     ----------------------------------------------------------------- */
  .vc-wf-skeleton {
    aspect-ratio: 3 / 4;
    border-radius: var(--wf-radius);
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.7), transparent), var(--wf-soft);
    background-size: 220% 100%;
    animation: vc-wf-shimmer 1.3s linear infinite;
  }
  .vc-wf-message {
    grid-column: 1 / -1;
    padding: 46px 20px;
    border: 1px dashed var(--wf-line);
    border-radius: var(--wf-radius);
    color: var(--wf-muted);
    font-size: 14px;
    text-align: center;
  }
  .vc-wf-message strong {
    display: block;
    margin-bottom: 6px;
    color: var(--wf-ink);
    font-family: Manrope, Inter, sans-serif;
    font-size: 16px;
  }

  /* -----------------------------------------------------------------
     7) ADDED-TO-CART MINI POPUP
     ----------------------------------------------------------------- */
  .vc-wf-toast {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 99999;
    width: min(340px, calc(100vw - 32px));
    padding: 18px;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 30px 70px -24px rgba(20, 20, 24, 0.55);
    transform: translateX(calc(100% + 32px));
    opacity: 0;
    pointer-events: none;
    transition: transform 0.45s var(--wf-ease), opacity 0.45s var(--wf-ease);
    font-family: Inter, sans-serif;
  }
  .vc-wf-toast.is-open { transform: translateX(0); opacity: 1; pointer-events: auto; }

  .vc-wf-toast-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: var(--wf-muted);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    transition: color 0.2s var(--wf-ease);
  }
  .vc-wf-toast-close:hover { color: var(--wf-ink); }

  .vc-wf-toast-top { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
  .vc-wf-toast-thumb {
    flex: 0 0 auto;
    width: 58px;
    height: 58px;
    border-radius: 12px;
    overflow: hidden;
    background: var(--wf-soft);
  }
  .vc-wf-toast-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .vc-wf-toast-note {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 700;
    color: #16794c;
  }
  .vc-wf-toast-note::before {
    content: "";
    width: 7px; height: 7px;
    border-radius: 999px;
    background: #16a34a;
  }
  .vc-wf-toast-title {
    margin: 4px 0 0;
    font-family: Manrope, Inter, sans-serif;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--wf-ink);
  }
  .vc-wf-toast-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .vc-wf-toast-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 11px 10px;
    border-radius: 10px;
    font-family: Manrope, Inter, sans-serif;
    font-size: 12.5px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.2s var(--wf-ease), background 0.2s var(--wf-ease), color 0.2s var(--wf-ease);
  }
  .vc-wf-toast-btn.ghost { border: 1px solid var(--wf-line); background: #fff; color: var(--wf-ink); }
  .vc-wf-toast-btn.ghost:hover { border-color: var(--wf-ink); }
  .vc-wf-toast-btn.solid { border: 0; background: var(--wf-ink); color: #fff; }
  .vc-wf-toast-btn.solid:hover { transform: translateY(-1px); }

  /* -----------------------------------------------------------------
     8) ANIMATIONS
     ----------------------------------------------------------------- */
  @keyframes vc-wf-shimmer { to { background-position: -220% 0; } }
  @keyframes vc-wf-shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  /* -----------------------------------------------------------------
     9) RESPONSIVE
     ----------------------------------------------------------------- */
  @media (max-width: 1100px) {
    .vc-wf-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 800px) {
    .vc-wf-wrap { padding: 48px 16px 60px; }
    .vc-wf-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .vc-wf-head { align-items: flex-start; }
  }
  @media (max-width: 520px) {
    .vc-wf-grid { grid-template-columns: 1fr; }
    .vc-wf-viewall { width: 100%; justify-content: center; }
    .vc-wf-toast { left: 16px; right: 16px; top: auto; bottom: 16px; width: auto; transform: translateY(calc(100% + 24px)); }
    .vc-wf-toast.is-open { transform: translateY(0); }
  }

  /* On touch devices there is no hover, so the reveal-on-hover panel would
     be unreachable. Keep it as a visible overlay pinned to the image bottom
     (staying absolutely positioned avoids clipping inside .vc-wf-media). */
  @media (hover: none) {
    .vc-wf-panel {
      transform: none;
      opacity: 1;
      pointer-events: auto;
      background: linear-gradient(to top, #ffffff 88%, rgba(255, 255, 255, 0.55) 100%);
    }
    /* Avoid a sticky "lifted" state after tapping on touch screens. */
    .vc-wf-card:hover .vc-wf-media,
    .vc-wf-card:focus-within .vc-wf-media { transform: none; box-shadow: var(--wf-shadow); }
  }

  /* Respect reduced-motion preferences */
  @media (prefers-reduced-motion: reduce) {
    .vc-wf-card, .vc-wf-img, .vc-wf-panel, .vc-wf-media, .vc-wf-toast { transition: none !important; }
    .vc-wf-card { opacity: 1 !important; transform: none !important; }
  }
</style>

<section class="vc-wf-wrap" aria-labelledby="vcWfTitle">

  <!-- ===================== SECTION HEADER ===================== -->
  <header class="vc-wf-head">
    <div class="vc-wf-head-text">
      <span class="vc-wf-label">Women Collection</span>
      <h2 class="vc-wf-title" id="vcWfTitle">Premium Women&rsquo;s Fashion</h2>
      <p class="vc-wf-sub">Discover premium-quality apparel designed for comfort, style, and everyday confidence.</p>
    </div>
    <!-- Replace href with your Women shop archive if different -->
    <a class="vc-wf-viewall" href="/product-category/women/">
      View All Products
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </header>

  <!-- ===================== TOOLBAR (filters + sort) ===================== -->
  <div class="vc-wf-toolbar" aria-label="Women product controls">
    <div class="vc-wf-chips" id="vcWfChips" role="list"></div>
    <select class="vc-wf-sort" id="vcWfSort" aria-label="Sort Women products">
      <option value="popularity">Most Popular</option>
      <option value="date">Newest</option>
      <option value="price">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
    </select>
  </div>

  <!-- ===================== PRODUCT GRID ===================== -->
  <div id="vcWfGrid" class="vc-wf-grid" aria-live="polite"></div>

  <!-- ===================== ADDED-TO-CART MINI POPUP ===================== -->
  <div class="vc-wf-toast" id="vcWfToast" role="status" aria-live="polite" aria-hidden="true">
    <button class="vc-wf-toast-close" type="button" data-wf-toast-close aria-label="Close notification">&times;</button>
    <div class="vc-wf-toast-top">
      <div class="vc-wf-toast-thumb" id="vcWfToastThumb" aria-hidden="true"></div>
      <div>
        <span class="vc-wf-toast-note">Added to your cart</span>
        <p class="vc-wf-toast-title" id="vcWfToastTitle"></p>
      </div>
    </div>
    <div class="vc-wf-toast-actions">
      <button class="vc-wf-toast-btn ghost" type="button" data-wf-toast-close>Continue Shopping</button>
      <!-- Replace href with your cart URL if different -->
      <a class="vc-wf-toast-btn solid" id="vcWfToastCart" href="/cart/">View Cart</a>
    </div>
  </div>

</section>

<script>
(function () {
  "use strict";

  /* =================================================================
     CONFIG — edit these to match your store
     ================================================================= */
  var CONFIG = {
    api: "/wp-json/wc/store/v1",
    requiredCategorySlug: "women",     // main category slug (with subcategories)
    perPage: 8,
    cartUrl: "/cart/",
    cartTokenKey: "vcWcCartToken",     // shared with the rest of the VibeCano site
    wishlistKey: "vcWomenWishlist"
  };

  var state = { activeChip: "all", sort: "popularity" };
  var filterChips = [{ slug: "all", label: "All Women", categoryIds: [], categorySlugs: [] }];
  var cache = Object.create(null);
  var productLookup = Object.create(null);
  var taxonomyCache = Object.create(null);
  var wishlist = loadWishlist();
  var toastTimer = null;

  var chipsEl = document.getElementById("vcWfChips");
  var gridEl = document.getElementById("vcWfGrid");
  var sortEl = document.getElementById("vcWfSort");
  var toastEl = document.getElementById("vcWfToast");
  var toastThumbEl = document.getElementById("vcWfToastThumb");
  var toastTitleEl = document.getElementById("vcWfToastTitle");
  var toastCartEl = document.getElementById("vcWfToastCart");

  if (!chipsEl || !gridEl || !sortEl || !window.fetch) return;

  init();

  /* =================================================================
     INIT + EVENTS
     ================================================================= */
  function init() {
    if (toastCartEl) toastCartEl.setAttribute("href", CONFIG.cartUrl);

    sortEl.addEventListener("change", function () {
      state.sort = sortEl.value;
      loadProducts();
    });

    gridEl.addEventListener("click", handleGridClick);

    if (toastEl) {
      toastEl.addEventListener("click", function (event) {
        if (event.target && event.target.hasAttribute("data-wf-toast-close")) hideToast();
      });
    }
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") hideToast();
    });

    setupCategoryChips().then(loadProducts).catch(function () {
      renderChips();
      loadProducts();
    });
  }

  /* =================================================================
     CATEGORY CHIPS (Women parent + subcategories)
     ================================================================= */
  function setupCategoryChips() {
    return fetch(CONFIG.api + "/products/categories?per_page=100", { credentials: "same-origin" })
      .then(checkResponse)
      .then(function (categories) {
        var parent = findBySlug(categories, CONFIG.requiredCategorySlug);
        if (!parent || !parent.id) { renderChips(); return; }

        var allWomen = [parent].concat(getDescendants(categories, parent.id));
        filterChips[0].categoryIds = allWomen.map(getId).filter(Boolean);
        filterChips[0].categorySlugs = allWomen.map(getSlug).filter(Boolean);
        allWomen.forEach(function (c) { taxonomyCache[c.slug] = Number(c.id); });

        var children = categories.filter(function (c) { return c && Number(c.parent) === Number(parent.id); });
        filterChips = [filterChips[0]].concat(children.map(function (c) {
          var group = [c].concat(getDescendants(categories, c.id));
          return {
            slug: c.slug,
            label: c.name,
            categoryIds: group.map(getId).filter(Boolean),
            categorySlugs: group.map(getSlug).filter(Boolean)
          };
        }));
        renderChips();
      });
  }

  function renderChips() {
    chipsEl.innerHTML = "";
    filterChips.forEach(function (chip, index) {
      var button = document.createElement("button");
      button.type = "button";
      button.className = "vc-wf-chip" + (index === 0 ? " is-active" : "");
      button.textContent = chip.label;
      button.setAttribute("aria-pressed", index === 0 ? "true" : "false");
      button.dataset.slug = chip.slug;
      button.addEventListener("click", function () {
        if (state.activeChip === chip.slug) return;
        state.activeChip = chip.slug;
        Array.prototype.forEach.call(chipsEl.children, function (child) {
          var active = child.dataset.slug === chip.slug;
          child.classList.toggle("is-active", active);
          child.setAttribute("aria-pressed", active ? "true" : "false");
        });
        loadProducts();
      });
      chipsEl.appendChild(button);
    });
  }

  /* =================================================================
     LOAD + RENDER PRODUCTS
     ================================================================= */
  function loadProducts() {
    var chip = getActiveChip();
    renderLoading();

    resolveCategoryId(CONFIG.requiredCategorySlug)
      .then(function (requiredId) {
        var categoryIds = chip.categoryIds && chip.categoryIds.length ? chip.categoryIds : [requiredId];
        if (!requiredId || !categoryIds.length) {
          renderMessage("No matching category found", "Check that the Women category slug in CONFIG is correct.");
          return [];
        }
        return fetchProducts(categoryIds, chip.categorySlugs);
      })
      .then(function (products) { if (Array.isArray(products)) renderProducts(products); })
      .catch(function () {
        renderMessage("Products could not be loaded", "Refresh the page or confirm the WooCommerce Store API is enabled.");
      });
  }

  function resolveCategoryId(slug) {
    if (taxonomyCache[slug] !== undefined) return Promise.resolve(taxonomyCache[slug]);
    return fetch(CONFIG.api + "/products/categories?per_page=100", { credentials: "same-origin" })
      .then(checkResponse)
      .then(function (items) {
        var match = findBySlug(items, slug);
        var id = match && match.id ? Number(match.id) : 0;
        taxonomyCache[slug] = id;
        return id;
      })
      .catch(function () { taxonomyCache[slug] = 0; return 0; });
  }

  function fetchProducts(categoryIds, categorySlugs) {
    var key = categoryIds.join(",") + "|" + state.sort;
    if (cache[key]) return Promise.resolve(cache[key]);

    return fetch(buildProductsUrl(categoryIds), { credentials: "same-origin" })
      .then(checkResponse)
      .then(function (products) {
        var allowed = categorySlugs && categorySlugs.length ? categorySlugs : [CONFIG.requiredCategorySlug];
        var safe = Array.isArray(products) ? products.filter(function (p) { return matchesTerms(p, allowed); }) : [];
        cache[key] = safe;
        return safe;
      });
  }

  function buildProductsUrl(categoryIds) {
    var params = new URLSearchParams();
    params.set("per_page", String(CONFIG.perPage));
    params.set("category", categoryIds.join(","));
    if (state.sort === "price" || state.sort === "price-desc") {
      params.set("orderby", "price");
      params.set("order", state.sort === "price-desc" ? "desc" : "asc");
    } else if (state.sort === "date") {
      params.set("orderby", "date");
      params.set("order", "desc");
    } else {
      params.set("orderby", "popularity");
      params.set("order", "desc");
    }
    return CONFIG.api + "/products?" + params.toString();
  }

  function renderLoading() {
    gridEl.innerHTML = "";
    for (var i = 0; i < Math.min(CONFIG.perPage, 8); i += 1) {
      var s = document.createElement("div");
      s.className = "vc-wf-skeleton";
      s.setAttribute("aria-hidden", "true");
      gridEl.appendChild(s);
    }
  }

  function renderProducts(products) {
    if (!products.length) {
      renderMessage("No Women products found", "Add products to the Women category or its subcategories to show them here.");
      return;
    }
    productLookup = Object.create(null);
    gridEl.innerHTML = products.map(renderCard).join("");
  }

  function renderCard(product, index) {
    var id = getProductId(product);
    if (id) productLookup[id] = product;

    var url = escapeAttr(product.permalink || "#");
    var name = escapeHtml(product.name || "Product");
    var safeName = escapeAttr(product.name || "product");
    var images = getImages(product);
    var primary = images[0];
    var secondary = images[1];
    var wished = id && wishlist[id];
    var sizeInfo = getSizeInfo(product);
    var badge = getDiscountPercent(product.prices);

    var primaryImg = primary
      ? '<img class="vc-wf-img vc-wf-img--primary" src="' + escapeAttr(primary.src) + '" alt="' + escapeAttr(primary.alt || product.name || "Women product") + '" loading="lazy" decoding="async">'
      : "";
    var secondaryImg = secondary
      ? '<img class="vc-wf-img vc-wf-img--secondary" src="' + escapeAttr(secondary.src) + '" alt="" loading="lazy" decoding="async" aria-hidden="true">'
      : "";

    var sizesHtml = "";
    if (sizeInfo && sizeInfo.terms.length) {
      sizesHtml =
        '<div class="vc-wf-sizes" role="group" aria-label="Select size for ' + safeName + '">' +
          sizeInfo.terms.map(function (term) {
            return '<button class="vc-wf-size" type="button" data-action="size" data-size="' + escapeAttr(term.name) + '">' + escapeHtml(term.name) + "</button>";
          }).join("") +
        "</div>";
    }

    return [
      '<article class="vc-wf-card" data-product-id="' + escapeAttr(id) + '" style="--i:' + (index || 0) + '">',
        '<div class="vc-wf-media">',
          badge ? '<span class="vc-wf-badge">-' + badge + "%</span>" : "",
          '<button class="vc-wf-wish' + (wished ? " is-active" : "") + '" type="button" data-action="wishlist" data-product-id="' + escapeAttr(id) + '" aria-pressed="' + (wished ? "true" : "false") + '" aria-label="' + (wished ? "Remove " : "Add ") + safeName + (wished ? " from wishlist" : " to wishlist") + '">' + heartSvg(wished) + "</button>",
          '<a class="vc-wf-media-link" href="' + url + '" aria-label="View ' + safeName + '">' + primaryImg + secondaryImg + "</a>",
          '<div class="vc-wf-panel">',
            sizesHtml,
            '<button class="vc-wf-add" type="button" data-action="add" data-product-id="' + escapeAttr(id) + '">Add to Cart</button>',
          "</div>",
        "</div>",
        '<div class="vc-wf-info">',
          '<a class="vc-wf-name" href="' + url + '">' + name + "</a>",
          renderPrice(product.prices),
        "</div>",
      "</article>"
    ].join("");
  }

  function renderPrice(prices) {
    if (!prices || !prices.price) return '<div class="vc-wf-price"></div>';
    var regular = prices.regular_price;
    var sale = prices.sale_price;
    var onSale = regular && sale && String(regular) !== String(sale);
    if (onSale) {
      return '<div class="vc-wf-price is-sale">' +
        '<span class="vc-wf-now">' + escapeHtml(money(prices, sale)) + "</span>" +
        '<del class="vc-wf-was">' + escapeHtml(money(prices, regular)) + "</del>" +
        "</div>";
    }
    return '<div class="vc-wf-price"><span class="vc-wf-now">' + escapeHtml(money(prices, prices.price)) + "</span></div>";
  }

  /* =================================================================
     CARD INTERACTIONS
     ================================================================= */
  function handleGridClick(event) {
    var actionEl = event.target && event.target.closest("[data-action]");
    if (!actionEl || !gridEl.contains(actionEl)) return;
    var action = actionEl.dataset.action;

    if (action === "wishlist") {
      event.preventDefault();
      toggleWishlist(actionEl, actionEl.getAttribute("data-product-id"));
    } else if (action === "size") {
      event.preventDefault();
      selectSize(actionEl);
    } else if (action === "add") {
      event.preventDefault();
      handleAdd(actionEl);
    }
  }

  function selectSize(button) {
    var group = button.closest(".vc-wf-sizes");
    var card = button.closest(".vc-wf-card");
    if (!group || !card) return;
    Array.prototype.forEach.call(group.querySelectorAll(".vc-wf-size"), function (pill) {
      pill.classList.toggle("is-selected", pill === button);
    });
    group.classList.remove("is-shake");
    card.dataset.selectedSize = button.getAttribute("data-size") || "";
  }

  function handleAdd(button) {
    var card = button.closest(".vc-wf-card");
    var id = button.getAttribute("data-product-id");
    var product = productLookup[id];
    if (!product || !card) return;

    var sizeInfo = getSizeInfo(product);
    var selectedSize = card.dataset.selectedSize || "";

    if (sizeInfo && sizeInfo.terms.length && !selectedSize) {
      var sizes = card.querySelector(".vc-wf-sizes");
      if (sizes) {
        sizes.classList.remove("is-shake");
        void sizes.offsetWidth;               // restart animation
        sizes.classList.add("is-shake");
      }
      flashButton(button, "Select a size");
      return;
    }
    addToCart(product, selectedSize, button);
  }

  function flashButton(button, text) {
    var old = button.textContent;
    button.textContent = text;
    setTimeout(function () { button.textContent = old; }, 1400);
  }

  /* =================================================================
     ADD TO CART (WooCommerce Store API) — same pattern as the site
     ================================================================= */
  function addToCart(product, sizeName, button) {
    var original = button.textContent;
    var nonce = "";
    var token = "";

    button.disabled = true;
    button.textContent = "Adding...";

    fetch(CONFIG.api + "/cart", {
      credentials: "include",
      headers: getStoredCartToken() ? { "Cart-Token": getStoredCartToken() } : {}
    })
      .then(function (response) {
        nonce = response.headers.get("Nonce") || response.headers.get("X-WC-Store-API-Nonce") || "";
        token = storeCartToken(response);
        return fetch(CONFIG.api + "/cart/add-item", {
          method: "POST",
          credentials: "include",
          headers: getCartHeaders(nonce, token),
          body: JSON.stringify(buildAddToCartPayload(product, sizeName))
        });
      })
      .then(function (response) {
        storeCartToken(response);
        return response.json().then(function (data) {
          if (!response.ok) throw new Error(data && data.message ? data.message : "Add to cart failed");
          if (!data.items || !data.items.length) throw new Error("Product was not added to cart");
          return data;
        });
      })
      .then(function () {
        try { document.body.dispatchEvent(new CustomEvent("wc-blocks_added_to_cart")); } catch (e) {}
        showToast(product);
      })
      .catch(function () {
        // Safe fallback: send the shopper to the product page to finish
        // selecting options (this mirrors the original link behaviour).
        window.location.href = product.permalink || CONFIG.cartUrl;
      })
      .finally(function () {
        button.disabled = false;
        button.textContent = original;
      });
  }

  function buildAddToCartPayload(product, sizeName) {
    var payload = { id: Number(getProductId(product)) || product.id, quantity: 1 };
    var sizeInfo = getSizeInfo(product);
    if (sizeName && sizeInfo && sizeInfo.attribute) {
      // Site convention: use the attribute NAME + the term NAME.
      payload.variation = [{ attribute: sizeInfo.attribute.name, value: sizeName }];
    }
    return payload;
  }

  function getCartHeaders(nonce, token) {
    var headers = { "Content-Type": "application/json", "Nonce": nonce, "X-WC-Store-API-Nonce": nonce };
    token = token || getStoredCartToken();
    if (token) headers["Cart-Token"] = token;
    return headers;
  }

  function getStoredCartToken() {
    try { return sessionStorage.getItem(CONFIG.cartTokenKey) || ""; } catch (e) { return ""; }
  }

  function storeCartToken(response) {
    var token = response.headers.get("Cart-Token");
    if (!token) return getStoredCartToken();
    try { sessionStorage.setItem(CONFIG.cartTokenKey, token); } catch (e) {}
    return token;
  }

  /* =================================================================
     ADDED-TO-CART POPUP
     ================================================================= */
  function showToast(product) {
    if (!toastEl) return;
    var image = getImages(product)[0];
    if (toastThumbEl) {
      toastThumbEl.innerHTML = image
        ? '<img src="' + escapeAttr(image.src) + '" alt="' + escapeAttr(product.name || "") + '">'
        : "";
    }
    if (toastTitleEl) toastTitleEl.textContent = product.name || "Product";
    if (toastCartEl) toastCartEl.setAttribute("href", CONFIG.cartUrl);

    toastEl.classList.add("is-open");
    toastEl.setAttribute("aria-hidden", "false");

    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(hideToast, 4000);   // auto close after 4s
  }

  function hideToast() {
    if (!toastEl || !toastEl.classList.contains("is-open")) return;
    toastEl.classList.remove("is-open");
    toastEl.setAttribute("aria-hidden", "true");
    if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
  }

  /* =================================================================
     WISHLIST (localStorage)
     ================================================================= */
  function toggleWishlist(button, id) {
    if (!id) return;
    var product = productLookup[id];
    var name = product && product.name ? product.name : "product";
    var active;
    if (wishlist[id]) { delete wishlist[id]; active = false; }
    else { wishlist[id] = true; active = true; }
    saveWishlist();
    button.classList.toggle("is-active", active);
    button.setAttribute("aria-pressed", active ? "true" : "false");
    button.setAttribute("aria-label", (active ? "Remove " : "Add ") + name + (active ? " from wishlist" : " to wishlist"));
    button.innerHTML = heartSvg(active);
  }

  function loadWishlist() {
    var items = Object.create(null);
    var ids;
    try {
      var raw = window.localStorage && window.localStorage.getItem(CONFIG.wishlistKey);
      ids = raw ? JSON.parse(raw) : [];
    } catch (e) { ids = []; }
    if (Array.isArray(ids)) ids.forEach(function (id) { if (id) items[String(id)] = true; });
    return items;
  }

  function saveWishlist() {
    try { if (window.localStorage) window.localStorage.setItem(CONFIG.wishlistKey, JSON.stringify(Object.keys(wishlist))); } catch (e) {}
  }

  /* =================================================================
     PRODUCT HELPERS
     ================================================================= */
  function getProductId(product) { return product && product.id !== undefined ? String(product.id) : ""; }

  function getImages(product) {
    return product && Array.isArray(product.images) ? product.images : [];
  }

  // Finds the "Size" attribute and its available terms.
  function getSizeInfo(product) {
    var attributes = product && Array.isArray(product.attributes) ? product.attributes : [];
    var sizeAttr = attributes.filter(function (attr) {
      return attr && (/size/i.test(attr.name || "") || /size/i.test(attr.taxonomy || ""));
    })[0];
    if (!sizeAttr) return null;
    var terms = Array.isArray(sizeAttr.terms) ? sizeAttr.terms.filter(Boolean) : [];
    if (!terms.length) return null;
    return { attribute: sizeAttr, terms: terms };
  }

  function getDiscountPercent(prices) {
    if (!prices) return 0;
    var regular = parseInt(prices.regular_price, 10);
    var sale = parseInt(prices.sale_price, 10);
    if (!regular || !sale || sale >= regular) return 0;
    return Math.round((1 - sale / regular) * 100);
  }

  function matchesTerms(product, slugs) {
    var terms = product && Array.isArray(product.categories) ? product.categories : [];
    return slugs.some(function (slug) {
      return terms.some(function (term) { return term && term.slug === slug; });
    });
  }

  function money(prices, value) {
    var minor = Number(prices.currency_minor_unit);
    var decimals = Number.isFinite(minor) ? minor : 2;
    var amount = parseInt(value, 10);
    if (!Number.isFinite(amount)) return "";
    var prefix = prices.currency_prefix || prices.currency_symbol || "";
    var suffix = prices.currency_suffix || "";
    var dec = prices.currency_decimal_separator || ".";
    var thou = prices.currency_thousand_separator || ",";
    var str = (amount / Math.pow(10, decimals)).toFixed(decimals);
    var parts = str.split(".");
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, thou);
    return prefix + parts.join(dec) + suffix;
  }

  /* =================================================================
     SMALL UTILITIES
     ================================================================= */
  function heartSvg(filled) {
    return '<svg viewBox="0 0 24 24" aria-hidden="true" fill="' + (filled ? "currentColor" : "none") + '" stroke="currentColor" stroke-width="1.8">' +
      '<path d="M12 20.5s-7.5-4.7-9.6-9.3C1 8 2.6 5 5.6 5c1.9 0 3.3 1.1 4.4 2.6C11.1 6.1 12.5 5 14.4 5c3 0 4.6 3 3.2 6.2C19.5 15.8 12 20.5 12 20.5z" stroke-linejoin="round"/></svg>';
  }

  function findBySlug(items, slug) {
    if (!Array.isArray(items)) return null;
    return items.filter(function (item) { return item && item.slug === slug; })[0] || null;
  }
  function getActiveChip() {
    return filterChips.filter(function (chip) { return chip.slug === state.activeChip; })[0] || filterChips[0];
  }
  function getDescendants(categories, parentId) {
    var out = [];
    categories.filter(function (c) { return c && Number(c.parent) === Number(parentId); }).forEach(function (c) {
      out.push(c);
      out = out.concat(getDescendants(categories, c.id));
    });
    return out;
  }
  function getId(c) { return c && c.id ? Number(c.id) : 0; }
  function getSlug(c) { return c && c.slug ? c.slug : ""; }

  function checkResponse(response) {
    if (!response.ok) throw new Error("Store API request failed: " + response.status);
    return response.json();
  }
  function renderMessage(title, body) {
    gridEl.innerHTML = '<div class="vc-wf-message"><strong>' + escapeHtml(title) + "</strong>" + escapeHtml(body) + "</div>";
  }
  function escapeHtml(value) {
    return String(value === undefined || value === null ? "" : value).replace(/[&<>"']/g, function (ch) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch];
    });
  }
  function escapeAttr(value) { return escapeHtml(value).replace(/`/g, "&#96;"); }

  /* =================================================================
     SCROLL FADE-IN (staggered)
     ================================================================= */
  var revealObserver = ("IntersectionObserver" in window)
    ? new IntersectionObserver(function (entries, obs) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) { entry.target.classList.add("is-visible"); obs.unobserve(entry.target); }
        });
      }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" })
    : null;

  // Observe cards as they are rendered.
  var gridMutation = new MutationObserver(function () {
    var cards = gridEl.querySelectorAll(".vc-wf-card:not(.is-visible)");
    if (!revealObserver) {
      Array.prototype.forEach.call(cards, function (card) { card.classList.add("is-visible"); });
      return;
    }
    Array.prototype.forEach.call(cards, function (card) { revealObserver.observe(card); });
  });
  gridMutation.observe(gridEl, { childList: true });
})();
</script>
