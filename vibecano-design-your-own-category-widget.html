<!-- ============================================================
     VIBECANO — DESIGN YOUR OWN CATEGORY PRODUCTS WIDGET
     Paste this whole file into an Elementor HTML widget.

     Products must belong to the Design Your Own main category or its subcategories.
     The Select Option button opens the single product page so customers can design,
     select options, add to cart, and buy.
     ============================================================ -->
<style>
  :root {
    --vc-dyo-bg: #f8fafc;
    --vc-dyo-card: rgba(255, 255, 255, 0.92);
    --vc-dyo-text: #0f172a;
    --vc-dyo-muted: #64748b;
    --vc-dyo-line: rgba(148, 163, 184, 0.28);
    --vc-dyo-primary: #4f46e5;
    --vc-dyo-primary-dark: #3730a3;
    --vc-dyo-accent: #f97316;
    --vc-dyo-success: #16a34a;
    --vc-dyo-shadow: 0 22px 60px -28px rgba(15, 23, 42, 0.45);
  }

  .vc-dyo-wrap {
    position: relative;
    max-width: 1280px;
    margin: 0 auto;
    padding: 44px 20px;
    color: var(--vc-dyo-text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .vc-dyo-shell {
    position: relative;
    overflow: hidden;
    padding: 30px;
    border: 1px solid var(--vc-dyo-line);
    border-radius: 30px;
    background:
      radial-gradient(circle at top left, rgba(79, 70, 229, 0.15), transparent 36%),
      radial-gradient(circle at top right, rgba(249, 115, 22, 0.12), transparent 32%),
      linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(248, 250, 252, 0.78));
    box-shadow: var(--vc-dyo-shadow);
    isolation: isolate;
  }

  .vc-dyo-shell::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    background-image:
      linear-gradient(rgba(148, 163, 184, 0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148, 163, 184, 0.12) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: linear-gradient(to bottom, black, transparent 70%);
  }

  .vc-dyo-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
  }

  .vc-dyo-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 7px 12px;
    border: 1px solid rgba(22, 163, 74, 0.2);
    border-radius: 999px;
    background: rgba(220, 252, 231, 0.84);
    color: #166534;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .vc-dyo-kicker::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--vc-dyo-success);
    box-shadow: 0 0 0 6px rgba(22, 163, 74, 0.12);
  }

  .vc-dyo-title {
    margin: 0;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.045em;
  }

  .vc-dyo-sub {
    max-width: 640px;
    margin: 10px 0 0;
    color: var(--vc-dyo-muted);
    font-size: 15px;
    line-height: 1.65;
  }

  .vc-dyo-viewall {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 42px;
    padding: 0 16px;
    border: 1px solid rgba(79, 70, 229, 0.18);
    border-radius: 999px;
    background: #fff;
    color: var(--vc-dyo-primary);
    font-size: 13px;
    font-weight: 800;
    text-decoration: none;
    box-shadow: 0 12px 30px -22px rgba(79, 70, 229, 0.8);
    transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    white-space: nowrap;
  }

  .vc-dyo-viewall:hover,
  .vc-dyo-viewall:focus-visible {
    border-color: rgba(79, 70, 229, 0.45);
    color: var(--vc-dyo-primary-dark);
    transform: translateY(-1px);
  }

  .vc-dyo-toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 22px;
    padding: 10px;
    border: 1px solid rgba(226, 232, 240, 0.82);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(14px);
  }

  .vc-dyo-sort {
    width: auto;
    min-width: 168px;
    max-width: 210px;
    padding: 9px 36px 9px 12px;
    border: 1px solid rgba(226, 232, 240, 0.96);
    border-radius: 14px;
    background: #fff;
    color: var(--vc-dyo-text);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    font-size: 13px;
    font-weight: 800;
  }

  .vc-dyo-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 18px;
  }

  .vc-dyo-card {
    position: relative;
    display: flex;
    overflow: hidden;
    min-width: 0;
    border: 1px solid rgba(226, 232, 240, 0.86);
    border-radius: 24px;
    background: var(--vc-dyo-card);
    box-shadow: 0 16px 40px -32px rgba(15, 23, 42, 0.85);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    flex-direction: column;
  }

  .vc-dyo-card:hover {
    border-color: rgba(79, 70, 229, 0.28);
    box-shadow: 0 24px 60px -34px rgba(15, 23, 42, 0.95);
    transform: translateY(-5px);
  }

  .vc-dyo-img {
    position: relative;
    overflow: hidden;
    aspect-ratio: 1 / 1;
    background:
      linear-gradient(135deg, rgba(79, 70, 229, 0.08), rgba(249, 115, 22, 0.08)),
      #f1f5f9;
  }

  .vc-dyo-img a {
    display: block;
    width: 100%;
    height: 100%;
    text-decoration: none;
  }

  .vc-dyo-img img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    transition: transform 0.45s ease, filter 0.45s ease;
  }

  .vc-dyo-card:hover .vc-dyo-img img {
    filter: saturate(1.08);
    transform: scale(1.07);
  }

  .vc-dyo-body {
    display: flex;
    flex: 1;
    flex-direction: column;
    padding: 15px;
  }

  .vc-dyo-name {
    display: -webkit-box;
    overflow: hidden;
    min-height: 41px;
    margin: 0 0 14px;
    color: var(--vc-dyo-text);
    font-size: 15px;
    font-weight: 850;
    line-height: 1.38;
    text-decoration: none;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
  }

  .vc-dyo-name:hover,
  .vc-dyo-name:focus-visible {
    color: var(--vc-dyo-primary);
  }

  .vc-dyo-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 42px;
    margin-top: auto;
    padding: 10px 12px;
    border: 0;
    border-radius: 13px;
    background: var(--vc-dyo-accent);
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 950;
    line-height: 1;
    text-align: center;
    text-decoration: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }

  .vc-dyo-btn:hover,
  .vc-dyo-btn:focus-visible {
    background: #ea580c;
    box-shadow: 0 14px 24px -18px rgba(249, 115, 22, 0.9);
    transform: translateY(-1px);
  }

  .vc-dyo-message {
    grid-column: 1 / -1;
    padding: 36px 18px;
    border: 1px dashed rgba(148, 163, 184, 0.55);
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.72);
    color: var(--vc-dyo-muted);
    font-size: 14px;
    font-weight: 800;
    text-align: center;
  }

  .vc-dyo-message strong {
    display: block;
    margin-bottom: 6px;
    color: var(--vc-dyo-text);
    font-size: 16px;
  }

  .vc-dyo-skeleton {
    overflow: hidden;
    min-height: 344px;
    border-radius: 24px;
    background:
      linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.78), transparent),
      rgba(226, 232, 240, 0.65);
    background-size: 220% 100%;
    animation: vc-dyo-shimmer 1.35s linear infinite;
  }

  @keyframes vc-dyo-shimmer {
    to { background-position: -220% 0; }
  }

  @media (max-width: 1100px) {
    .vc-dyo-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }

  @media (max-width: 800px) {
    .vc-dyo-wrap { padding: 28px 14px; }
    .vc-dyo-shell { padding: 22px; border-radius: 24px; }
    .vc-dyo-head { align-items: flex-start; flex-direction: column; }
    .vc-dyo-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .vc-dyo-toolbar { justify-content: stretch; }
    .vc-dyo-sort { max-width: none; width: 100%; }
  }

  @media (max-width: 480px) {
    .vc-dyo-shell { padding: 18px; }
    .vc-dyo-grid { grid-template-columns: 1fr; }
  }
</style>

<section class="vc-dyo-wrap" aria-labelledby="vcDyoTitle">
  <div class="vc-dyo-shell">
    <div class="vc-dyo-head">
      <div>
        <span class="vc-dyo-kicker">Customize it yourself</span>
        <h2 class="vc-dyo-title" id="vcDyoTitle">Design Your Own</h2>
        <p class="vc-dyo-sub">Choose a product, design it yourself, then add it to cart and buy from the product page.</p>
      </div>
      <a class="vc-dyo-viewall" href="/product-category/design-your-own/">View all Design Your Own</a>
    </div>

    <div class="vc-dyo-toolbar" aria-label="Design Your Own product controls">
      <select class="vc-dyo-sort" id="vcDyoSort" aria-label="Sort Design Your Own products">
        <option value="popularity">Most Popular</option>
        <option value="date">Newest</option>
        <option value="price">Price Low to High</option>
        <option value="price-desc">Price High to Low</option>
      </select>
    </div>

    <div id="vcDyoGrid" class="vc-dyo-grid" aria-live="polite"></div>
  </div>
</section>

<script>
(function () {
  "use strict";

  var CONFIG = {
    requiredCategorySlug: "design-your-own",
    perPage: 8,
    endpoints: {
      products: "/wp-json/wc/store/v1/products",
      categories: "/wp-json/wc/store/v1/products/categories"
    }
  };

  var state = {
    sort: "popularity"
  };

  var cache = Object.create(null);
  var taxonomyCache = {
    category: Object.create(null)
  };

  var gridEl = document.getElementById("vcDyoGrid");
  var sortEl = document.getElementById("vcDyoSort");

  if (!gridEl || !sortEl || !window.fetch) {
    return;
  }

  init();

  function init() {
    sortEl.addEventListener("change", function () {
      state.sort = sortEl.value;
      loadProducts();
    });

    loadProducts();
  }

  function loadProducts() {
    renderLoading();

    getDesignYourOwnCategoryIds()
      .then(function (categoryData) {
        if (!categoryData.ids.length) {
          renderMessage(
            "No matching category found",
            "Please check that the WooCommerce Design Your Own category slug in CONFIG is correct."
          );
          return [];
        }

        return fetchProducts(categoryData.ids, categoryData.slugs);
      })
      .then(function (products) {
        if (Array.isArray(products)) {
          renderProducts(products);
        }
      })
      .catch(function () {
        renderMessage(
          "Products could not be loaded",
          "Please refresh the page or check that the WooCommerce Store API is enabled."
        );
      });
  }

  function getDesignYourOwnCategoryIds() {
    return fetch(CONFIG.endpoints.categories + "?per_page=100", { credentials: "same-origin" })
      .then(checkResponse)
      .then(function (categories) {
        var parentCategory = findBySlug(categories, CONFIG.requiredCategorySlug);
        var allCategories;

        if (!parentCategory || !parentCategory.id) {
          return { ids: [], slugs: [] };
        }

        allCategories = [parentCategory].concat(getDescendantCategories(categories, parentCategory.id));

        allCategories.forEach(function (category) {
          taxonomyCache.category[category.slug] = Number(category.id);
        });

        return {
          ids: allCategories.map(getCategoryId).filter(Boolean),
          slugs: allCategories.map(getCategorySlug).filter(Boolean)
        };
      });
  }

  function fetchProducts(categoryIds, categorySlugs) {
    var cacheKey = categoryIds.join(",") + "|sort:" + state.sort;

    if (cache[cacheKey]) {
      return Promise.resolve(cache[cacheKey]);
    }

    return fetch(buildProductsUrl(categoryIds), { credentials: "same-origin" })
      .then(checkResponse)
      .then(function (products) {
        var safeProducts = Array.isArray(products) ? products.filter(function (product) {
          return productMatchesRequiredTerms(product, categorySlugs);
        }) : [];

        cache[cacheKey] = safeProducts;
        return safeProducts;
      });
  }

  function buildProductsUrl(categoryIds) {
    var params = new URLSearchParams();
    params.set("per_page", String(CONFIG.perPage));
    params.set("category", categoryIds.join(","));

    if (state.sort === "price" || state.sort === "price-desc") {
      params.set("orderby", "price");
      params.set("order", state.sort === "price-desc" ? "desc" : "asc");
    } else if (state.sort === "date") {
      params.set("orderby", "date");
      params.set("order", "desc");
    } else {
      params.set("orderby", "popularity");
      params.set("order", "desc");
    }

    return CONFIG.endpoints.products + "?" + params.toString();
  }

  function renderLoading() {
    gridEl.innerHTML = "";

    for (var i = 0; i < Math.min(CONFIG.perPage, 8); i += 1) {
      var skeleton = document.createElement("div");
      skeleton.className = "vc-dyo-skeleton";
      skeleton.setAttribute("aria-hidden", "true");
      gridEl.appendChild(skeleton);
    }
  }

  function renderProducts(products) {
    if (!products.length) {
      renderMessage(
        "No Design Your Own products found",
        "Add products to the Design Your Own category or its subcategories to show them here."
      );
      return;
    }

    gridEl.innerHTML = products.map(renderProductCard).join("");
  }

  function renderProductCard(product) {
    var image = getProductImage(product);
    var productUrl = escapeAttr(product.permalink || "#");
    var productName = escapeHtml(product.name || "Product");
    var safeName = escapeAttr(product.name || "product");

    return [
      '<article class="vc-dyo-card">',
        '<div class="vc-dyo-img">',
          '<a href="' + productUrl + '" aria-label="Design ' + safeName + '">',
            image
              ? '<img src="' + escapeAttr(image.src) + '" alt="' + escapeAttr(image.alt || product.name || "Design Your Own product") + '" loading="lazy" decoding="async">'
              : "",
          "</a>",
        "</div>",
        '<div class="vc-dyo-body">',
          '<a class="vc-dyo-name" href="' + productUrl + '">' + productName + "</a>",
          '<a class="vc-dyo-btn" href="' + productUrl + '">Select Option</a>',
        "</div>",
      "</article>"
    ].join("");
  }

  function checkResponse(response) {
    if (!response.ok) {
      throw new Error("WooCommerce Store API request failed: " + response.status);
    }
    return response.json();
  }

  function findBySlug(items, slug) {
    if (!Array.isArray(items)) {
      return null;
    }

    return items.filter(function (item) {
      return item && item.slug === slug;
    })[0] || null;
  }

  function getDescendantCategories(categories, parentId) {
    var descendants = [];
    var directChildren = categories.filter(function (category) {
      return category && Number(category.parent) === Number(parentId);
    });

    directChildren.forEach(function (category) {
      descendants.push(category);
      descendants = descendants.concat(getDescendantCategories(categories, category.id));
    });

    return descendants;
  }

  function getCategoryId(category) {
    return category && category.id ? Number(category.id) : 0;
  }

  function getCategorySlug(category) {
    return category && category.slug ? category.slug : "";
  }

  function getProductImage(product) {
    return product && product.images && product.images.length ? product.images[0] : null;
  }

  function productMatchesRequiredTerms(product, categorySlugs) {
    return categorySlugs.some(function (slug) {
      return productHasTerm(product, "categories", slug);
    });
  }

  function productHasTerm(product, key, slug) {
    var terms = product && Array.isArray(product[key]) ? product[key] : [];

    return terms.some(function (term) {
      return term && term.slug === slug;
    });
  }

  function renderMessage(title, body) {
    gridEl.innerHTML = '<div class="vc-dyo-message"><strong>' + escapeHtml(title) + "</strong>" + escapeHtml(body) + "</div>";
  }

  function escapeHtml(value) {
    return String(value || "").replace(/[&<>"']/g, function (character) {
      return {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[character];
    });
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, "&#96;");
  }
})();
</script>
