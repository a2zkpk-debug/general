<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
  .vc-cz, .vc-cz * { box-sizing: border-box; }
  .vc-cz {

  .vc-cz-total-val { font-family: Manrope, sans-serif; font-size: 20px; font-weight: 800; color: var(--navy); text-align: right; }

  .vc-cz-layout {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: clamp(18px, 2.5vw, 32px);
    align-items: start;
    max-width: 1440px;
    margin: 0 auto;

  /* Preview */
  .vc-cz-preview-wrap { position: sticky; top: 84px; }

    border: 1px solid var(--line);

    opacity: .14; mix-blend-mode: multiply; pointer-events: none;
  }
  .vc-cz-stage-img {

  .vc-cz-stage-shadow {

  .vc-cz-overlay.is-right_chest { right: 30%; top: 30%; width: 18%; height: 12%; }
  .vc-cz-overlay.is-left_sleeve { left: 8%; top: 38%; width: 14%; height: 10%; }
  .vc-cz-overlay.is-right_sleeve { right: 8%; top: 38%; width: 14%; height: 10%; }
  .vc-cz-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,.25)); }
  .vc-cz-overlay-text { text-align: center; line-height: 1.15; font-weight: 800; font-size: clamp(10px, 2.2vw, 18px); text-shadow: 0 1px 2px rgba(0,0,0,.2); }

  .vc-cz-overlay-text.is-modern { font-weight: 600; letter-spacing: .06em; text-transform: none; }
  .vc-cz-overlay-ph {

    overflow: auto;

  .vc-cz-section { padding: 18px 0; border-bottom: 1px solid var(--line); }

    margin: 0 0 12px; font-size: 13px; font-weight: 800; letter-spacing: -.01em;
  }
  .vc-cz-section-head {
    display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px;
  }
  .vc-cz-section-head .vc-cz-section-title { margin: 0; }

  .vc-cz-drop {
    border: 2px dashed #cbd5e1; border-radius: 16px; padding: 28px 14px; text-align: center;

    box-shadow: 0 14px 28px -16px rgba(11,61,74,.85);
  }
  .vc-cz-del.is-active span { color: #99f6e4; }

    },

  };

  var COLOR_HEX = {
    white: "#F5F5F4", black: "#111827", navy: "#0B3D4A", blue: "#1D4ED8",
    red: "#DC2626", green: "#166534", grey: "#9CA3AF", gray: "#9CA3AF",
    maroon: "#7F1D1D", orange: "#EA580C", teal: "#0E7490", sand: "#D6B88D"
  };

  var state = {
    product: null,
    colorId: "",
    sizeId: "",
    multiSize: false,
    sizeQty: {},
    decoration: "screenprint",
    locations: [],
    configs: {},
    printMode: null,
    delivery: "standard_5",
    qty: 1,
    side: "front",
    priceOpen: false
  };

  function money(n) {
    var sym = (state.product && state.product.currencySymbol) || "Rs ";
    return sym + Math.round(n || 0).toLocaleString("en-PK");
  }

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
    });
  }

  function shade(hex, pct) {
    var raw = String(hex || "#e2e8f0").replace("#", "");
    if (raw.length === 3) raw = raw.split("").map(function (c) { return c + c; }).join("");
    var num = parseInt(raw, 16);
    if (!Number.isFinite(num)) return hex;
    var r = Math.min(255, Math.max(0, (num >> 16) + pct));
    var g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + pct));
    var b = Math.min(255, Math.max(0, (num & 0xff) + pct));
    return "#" + (0x1000000 + (r << 16) + (g << 8) + b).toString(16).slice(1);
  }

  function colorToHex(name) {
    var n = String(name || "").toLowerCase().trim();
    if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(n)) return n;
    if (COLOR_HEX[n]) return COLOR_HEX[n];
    var parts = n.split(/[\s\-_/]+/);
    for (var i = 0; i < parts.length; i++) if (COLOR_HEX[parts[i]]) return COLOR_HEX[parts[i]];
    for (var k in COLOR_HEX) if (n.indexOf(k) >= 0) return COLOR_HEX[k];
    return "#94a3b8";
  }

  function defaultConfig(id) {
    return {
      artwork: null,
      textEnabled: false,
      line1: "",
      line2: "",
      textColor: "#111827",
      font: "block",
      artSize: "M"
    };
  }

  function getColor() {
    var p = state.product;
    if (!p) return null;
    return p.colors.filter(function (c) { return c.id === state.colorId; })[0] || p.colors[0];
  }

  function totalQty() {
    if (!state.multiSize) return Math.max(1, state.qty);
    var t = 0;
    Object.keys(state.sizeQty).forEach(function (k) { t += state.sizeQty[k] || 0; });
    return t;
  }

  function hasPrint() {
    var p = state.product;
    if (!p) return false;
    if (p.textOnlyMode) return !!state.printMode;
    return state.locations.some(function (id) {
      var cfg = state.configs[id];
      if (!cfg) return false;
      if (cfg.artwork && cfg.artwork.url) return true;
      if (cfg.textEnabled && String(cfg.line1 || "").trim()) return true;
      return false;
    });
  }

  function calcPrice() {
    var p = state.product;
    var lines = [];
    if (!p) return { unit: 0, qty: 1, total: 0, lines: lines };
    var unit = p.basePrice;
    lines.push({ label: "Base price", amount: p.basePrice });

    var color = getColor();
    var surcharge = (color && color.surcharge) || 0;
    if (surcharge) {
      unit += surcharge;
      lines.push({ label: (color.name || "Color") + " surcharge", amount: surcharge });
    }

    if (!p.textOnlyMode) {
      var extra = Math.max(0, state.locations.length - 1);
      if (extra) {
        var locFee = extra * p.pricing.extraLocationFee;
        unit += locFee;
        lines.push({ label: "Extra print location" + (extra > 1 ? "s" : "") + " (×" + extra + ")", amount: locFee });
      }
    } else if (state.printMode === "double_side") {
      unit += p.pricing.doubleSideFee;
      lines.push({ label: "Double side", amount: p.pricing.doubleSideFee });
    }

    if (state.decoration === "embroidery") {
      unit += p.pricing.embroideryFee;
      lines.push({ label: "Embroidery", amount: p.pricing.embroideryFee });
      var needsDig = state.locations.some(function (id) {
        var a = state.configs[id] && state.configs[id].artwork;
        return a && a.url && !a.digitized;
      });
      if (needsDig) {
        unit += p.pricing.digitizationFee;
        lines.push({ label: "Logo digitization (one-time)", amount: p.pricing.digitizationFee });
      }
    }

    if (state.delivery === "express_3") {
      unit += p.pricing.rushDeliveryFee;
      lines.push({ label: "Express delivery (3 days)", amount: p.pricing.rushDeliveryFee });
    }

    var qty = Math.max(1, totalQty());
    return { unit: unit, qty: qty, total: unit * qty, lines: lines };
  }

  function toast(msg) {
    var el = document.getElementById("vcCzToast");
    el.textContent = msg;
    el.classList.add("is-show");
    setTimeout(function () { el.classList.remove("is-show"); }, 2400);
  }

  function updateHeader() {
    var p = state.product;
    var color = getColor();
    var price = calcPrice();
    document.getElementById("vcCzName").textContent = p.name;
    document.getElementById("vcCzMeta").textContent = p.material + " · Base " + money(p.basePrice);
    document.getElementById("vcCzTotal").textContent = money(price.total);
    if (color) {
      document.getElementById("vcCzColorName").textContent = color.name;
      document.getElementById("vcCzColorDot").style.background = color.hex;
    }
    var back = document.getElementById("vcCzBack");
    back.href = p.permalink || "/shop/";
  }

  function updatePreview() {
    var p = state.product;
    var color = getColor();
    var stage = document.getElementById("vcCzStage");
    var img = document.getElementById("vcCzStageImg");
    var side = state.side === "back" ? "back" : "front";
    stage.classList.toggle("is-360", state.side === "360");
    img.src = side === "back" ? p.images.back : p.images.front;
    img.alt = p.name + " " + side;
    var hex = (color && color.hex) || "#e2e8f0";
    stage.style.background =
      "radial-gradient(circle at 30% 20%, rgba(255,255,255,.55), transparent 40%)," +
      "radial-gradient(circle at 70% 80%, rgba(0,0,0,.18), transparent 45%)," +
      "linear-gradient(145deg, " + hex + " 0%, " + shade(hex, -18) + " 100%)";

    var wrap = document.getElementById("vcCzOverlays");
    wrap.innerHTML = "";
    state.locations.forEach(function (id) {
      if (side === "back" && id !== "back") return;
      if (side === "front" && id === "back") return;
      if (state.side === "360" && id === "back") return;
      var cfg = state.configs[id];
      if (!cfg) return;
      var div = document.createElement("div");
      div.className = "vc-cz-overlay is-" + id + " vc-cz-size-" + (cfg.artSize || "M");
      if (cfg.artwork && cfg.artwork.url && !cfg.textEnabled) {
        div.innerHTML = '<img src="' + esc(cfg.artwork.url) + '" alt="">';
      } else if (cfg.textEnabled && String(cfg.line1 || "").trim()) {
        div.innerHTML =
          '<div class="vc-cz-overlay-text is-' + esc(cfg.font) + '" style="color:' + esc(cfg.textColor) + '">' +
          '<div>' + esc(cfg.line1) + '</div>' +
          (cfg.line2 ? '<div>' + esc(cfg.line2) + '</div>' : '') +
          '</div>';
      } else {
        var label = LOCATIONS.filter(function (l) { return l.id === id; })[0];
        div.innerHTML = '<div class="vc-cz-overlay-ph">' + esc(label ? label.label : id) + '</div>';
      }
      wrap.appendChild(div);
    });
  }

  function renderColors() {
    var p = state.product;
    var core = p.colors.filter(function (c) { return c.group === "core"; });
    var limited = p.colors.filter(function (c) { return c.group === "limited"; });
    function group(title, list) {
      if (!list.length) return "";
      return '<div class="vc-cz-group-label">' + esc(title) + '</div><div class="vc-cz-swatches">' +
        list.map(function (c) {
          return '<button type="button" class="vc-cz-swatch' + (state.colorId === c.id ? ' is-selected' : '') +
            '" data-color="' + esc(c.id) + '" title="' + esc(c.name + (c.surcharge ? ' (+Rs ' + c.surcharge + ')' : '')) +
            '" aria-label="' + esc(c.name) + '" aria-pressed="' + (state.colorId === c.id) +
            '" style="background:' + esc(c.hex) + '"></button>';
        }).join("") + '</div>';
    }
    document.getElementById("vcCzColorSection").innerHTML =
      '<h2 class="vc-cz-section-title">Color</h2>' + group("Core Colors", core) +
      (limited.length ? '<div style="margin-top:14px">' + group("Limited Edition", limited) + '</div>' : "");
  }

  function renderSizes() {
    var p = state.product;
    var adult = p.sizes.filter(function (s) { return !s.kids; });
    var kids = p.sizes.filter(function (s) { return s.kids; });
    var html = '<div class="vc-cz-section-head"><h2 class="vc-cz-section-title">Size</h2><div style="display:flex;gap:8px;align-items:center">' +
      '<button type="button" class="vc-cz-linkbtn" id="vcCzOpenChart">Size Chart</button>' +
      '<button type="button" class="vc-cz-mini-toggle' + (state.multiSize ? ' is-on' : '') + '" id="vcCzMultiSize">Select Multiple Sizes</button></div></div>';

    if (!state.multiSize) {
      html += sizeButtons(adult);
      if (kids.length) html += '<div class="vc-cz-group-label" style="margin-top:14px">Kids</div>' + sizeButtons(kids);
    } else {
      html += p.sizes.map(function (s) {
        var q = state.sizeQty[s.id] || 0;
        return '<div class="vc-cz-bulk-row"><div><strong>' + esc(s.label) + '</strong>' +
          (typeof s.stock === "number" ? '<small>' + s.stock + ' left</small>' : '') +

          '<span>' + q + '</span>' +
          '<button type="button" data-bulk="' + esc(s.id) + '" data-delta="1">+</button></div></div>';
      }).join("");
    }
    document.getElementById("vcCzSizeSection").innerHTML = html;
  }

  function sizeButtons(list) {
    return '<div class="vc-cz-sizes">' + list.map(function (s) {
      var out = typeof s.stock === "number" && s.stock <= 0;
      return '<button type="button" class="vc-cz-size' + (state.sizeId === s.id ? ' is-selected' : '') +
        '" data-size="' + esc(s.id) + '"' + (out ? ' disabled' : '') +
        ' title="' + esc(typeof s.stock === "number" ? s.stock + ' in stock' : s.label) + '">' + esc(s.label) + '</button>';
    }).join("") + '</div>';
  }

  function handleFile(id, file) {
    if (!file) return;
    var ok = /\.(jpe?g|png|pdf|ai|eps|svg)$/i.test(file.name);
    if (!ok) { toast("Unsupported file type"); return; }
    if (file.size > MAX_FILE_MB * 1024 * 1024) { toast("File exceeds " + MAX_FILE_MB + " MB"); return; }
    var cfg = state.configs[id] || defaultConfig(id);
    var url = URL.createObjectURL(file);
    cfg.artwork = { name: file.name, url: url, digitized: false };
    state.configs[id] = cfg;
    if (id === "back") state.side = "back";
    else if (state.side !== "360") state.side = "front";
    renderAll();
  }

  function bindPanel() {
    var panel = document.querySelector(".vc-cz-panel");
    panel.addEventListener("click", function (e) {
      var t = e.target.closest("[data-color],[data-size],[data-decor],[data-loc],[data-remove-loc],[data-clear-art],[data-artsize],[data-textcolor],[data-font],[data-pos],[data-del],[data-bulk],#vcCzOpenChart,#vcCzMultiSize,#vcCzPriceToggle,#vcCzQtyMinus,#vcCzQtyPlus,#vcCzAddCart,#vcCzSave,[data-drop]");
      if (!t) return;

      if (t.id === "vcCzOpenChart") {
        document.getElementById("vcCzChartModal").classList.add("is-open");
        return;
      }
      if (t.id === "vcCzMultiSize") {
        state.multiSize = !state.multiSize;
        if (state.multiSize) {
          state.sizeQty = {};
          state.sizeQty[state.sizeId] = state.qty;
        }
        renderAll();
        return;
      }
      if (t.getAttribute("data-color")) {
        state.colorId = t.getAttribute("data-color");
        renderAll();
        return;
      }
      if (t.getAttribute("data-size")) {
        state.sizeId = t.getAttribute("data-size");
        renderAll();
        return;
      }
      if (t.getAttribute("data-bulk")) {
        var sid = t.getAttribute("data-bulk");
        var delta = Number(t.getAttribute("data-delta"));
        state.sizeQty[sid] = Math.max(0, (state.sizeQty[sid] || 0) + delta);
        renderAll();
        return;
      }
      if (t.getAttribute("data-decor")) {
        state.decoration = t.getAttribute("data-decor");
        renderAll();
        return;
      }
      if (t.getAttribute("data-loc")) {
        var loc = t.getAttribute("data-loc");
        var idx = state.locations.indexOf(loc);
        if (idx >= 0) {
          state.locations.splice(idx, 1);
          delete state.configs[loc];
        } else {
          state.locations.push(loc);
          state.configs[loc] = defaultConfig(loc);
          state.side = loc === "back" ? "back" : (state.side === "360" ? "360" : "front");
        }
        renderAll();
        return;
      }
      if (t.getAttribute("data-remove-loc")) {
        var rid = t.getAttribute("data-remove-loc");
        state.locations = state.locations.filter(function (x) { return x !== rid; });
        delete state.configs[rid];
        renderAll();
        return;
      }
      if (t.getAttribute("data-clear-art")) {
        var cid = t.getAttribute("data-clear-art");
        if (state.configs[cid]) state.configs[cid].artwork = null;
        renderAll();
        return;
      }
      if (t.getAttribute("data-artsize")) {
        var aid = t.getAttribute("data-artsize");
        state.configs[aid].artSize = t.getAttribute("data-sizekey");
        renderAll();
        return;
      }
      if (t.getAttribute("data-textcolor")) {
        state.configs[t.getAttribute("data-textcolor")].textColor = t.getAttribute("data-hex");
        renderAll();
        return;
      }
      if (t.getAttribute("data-font")) {
        state.configs[t.getAttribute("data-font")].font = t.getAttribute("data-fontkey");
        renderAll();
        return;
      }
      if (t.getAttribute("data-pos")) {
        state.printMode = t.getAttribute("data-pos");
        renderAll();
        return;
      }
      if (t.getAttribute("data-del")) {
        state.delivery = t.getAttribute("data-del");
        renderAll();
        return;
      }
      if (t.id === "vcCzPriceToggle") {
        state.priceOpen = !state.priceOpen;
        renderPrice();
        return;
      }
      if (t.id === "vcCzQtyMinus") { state.qty = Math.max(1, state.qty - 1); renderAll(); return; }
      if (t.id === "vcCzQtyPlus") { state.qty += 1; renderAll(); return; }
      if (t.id === "vcCzAddCart") { addToCart(); return; }
      if (t.id === "vcCzSave") {
        try {
          localStorage.setItem("vcCzDesign:" + state.product.id, JSON.stringify({
            savedAt: Date.now(),
            state: {
              colorId: state.colorId,
              sizeId: state.sizeId,
              multiSize: state.multiSize,
              sizeQty: state.sizeQty,
              decoration: state.decoration,
              locations: state.locations,
              configs: stripBlobUrls(state.configs),
              printMode: state.printMode,
              delivery: state.delivery,
              qty: state.qty
            }
          }));
          toast("Design saved for later");
        } catch (err) {
          toast("Could not save design");
        }
        return;
      }
      if (t.getAttribute("data-drop")) {
        var input = t.querySelector('input[type="file"]');
        if (input) input.click();
      }
    });

    panel.addEventListener("change", function (e) {
      var t = e.target;
      if (t.getAttribute("data-usetext")) {
        var id = t.getAttribute("data-usetext");
        state.configs[id].textEnabled = !!t.checked;
        renderAll();
        return;
      }
      if (t.getAttribute("data-file") && t.files && t.files[0]) {
        handleFile(t.getAttribute("data-file"), t.files[0]);
      }
    });

    panel.addEventListener("input", function (e) {
      var t = e.target;
      if (t.getAttribute("data-line1")) {
        state.configs[t.getAttribute("data-line1")].line1 = t.value.slice(0, 26);
        updatePreview();
        updateHeader();
        renderPrice();
        var label = t.previousElementSibling && t.previousElementSibling.querySelector("span:last-child");
        if (label) label.textContent = t.value.length + "/26";
        return;
      }
      if (t.getAttribute("data-line2")) {
        state.configs[t.getAttribute("data-line2")].line2 = t.value.slice(0, 26);
        updatePreview();
      }
    });

    // Drag & drop
    panel.addEventListener("dragover", function (e) {
      var drop = e.target.closest("[data-drop]");
      if (!drop) return;
      e.preventDefault();
      drop.classList.add("is-drag");
    });
    panel.addEventListener("dragleave", function (e) {
      var drop = e.target.closest("[data-drop]");
      if (drop) drop.classList.remove("is-drag");
    });
    panel.addEventListener("drop", function (e) {
      var drop = e.target.closest("[data-drop]");
      if (!drop) return;
      e.preventDefault();
      drop.classList.remove("is-drag");
      var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      handleFile(drop.getAttribute("data-drop"), file);
    });
  }

  function stripBlobUrls(configs) {
    var out = {};
    Object.keys(configs).forEach(function (k) {
      var c = configs[k];
      out[k] = {
        artwork: c.artwork ? { name: c.artwork.name, digitized: !!c.artwork.digitized } : null,
        textEnabled: c.textEnabled,
        line1: c.line1,
        line2: c.line2,
        textColor: c.textColor,
        font: c.font,
        artSize: c.artSize
      };
    });
    return out;
  }

  function addToCart() {
    var err = document.getElementById("vcCzError");
    err.classList.remove("is-show");
    err.textContent = "";

    if (!state.product.textOnlyMode && !hasPrint()) {
      err.textContent = "Select a print location and add artwork or text first.";
      err.classList.add("is-show");
      return;
    }
    if (state.product.textOnlyMode && !state.printMode) {
      err.textContent = "Choose a print position.";
      err.classList.add("is-show");
      return;
    }
    if (!state.multiSize && !state.sizeId) {
      err.textContent = "Please choose a size.";
      err.classList.add("is-show");
      return;
    }
    if (state.multiSize && totalQty() < 1) {
      err.textContent = "Add quantity for at least one size.";
      err.classList.add("is-show");
      return;
    }

    var btn = document.getElementById("vcCzAddCart");
    btn.disabled = true;
    btn.textContent = "Adding…";

    var price = calcPrice();
    var payload = {
      product_id: state.product.id,
      name: state.product.name,
      color: getColor() && getColor().name,
      size: state.sizeId,
      multiSize: state.multiSize,
      sizeQty: state.sizeQty,
      decoration: state.decoration,
      locations: state.locations,
      printMode: state.printMode,
      delivery: state.delivery,
      quantity: price.qty,
      unitPrice: price.unit,
      total: price.total,
      lines: price.lines
    };

    try {
      sessionStorage.setItem("vcCzLastOrder", JSON.stringify(payload));
    } catch (e) {}

    // Attempt Store API add-item; fall back to toast + cart redirect
    var cartToken = sessionStorage.getItem("wcCartToken") || "";
    fetch(API + "/cart", {
      credentials: "include",
      headers: cartToken ? { "Cart-Token": cartToken } : {}
    })
      .then(function (res) {
        var nonce = res.headers.get("Nonce") || res.headers.get("X-WC-Store-API-Nonce") || "";
        var token = res.headers.get("Cart-Token") || cartToken;
        if (token) sessionStorage.setItem("wcCartToken", token);
        return fetch(API + "/cart/add-item", {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json",
            Nonce: nonce,
            "Cart-Token": token || ""
          },
          body: JSON.stringify({
            id: Number(state.product.id),
            quantity: price.qty,
            variation: []
          })
        });
      })
      .then(function (res) {
        if (res && res.headers) {
          var token = res.headers.get("Cart-Token");
          if (token) sessionStorage.setItem("wcCartToken", token);
        }
        return res && res.ok ? res.json() : Promise.reject();
      })
      .then(function () {
        toast("Added to cart");
        var token = sessionStorage.getItem("wcCartToken");
        window.location.href = token ? "/cart/?session=" + encodeURIComponent(token) : "/cart/";
      })
      .catch(function () {
        toast("Design ready · opening cart");
        setTimeout(function () { window.location.href = "/cart/"; }, 700);
      })
      .finally(function () {
        btn.disabled = false;
        btn.textContent = "Add to Cart";
      });
  }

  function params() {
    try { return new URLSearchParams(window.location.search); } catch (e) { return new URLSearchParams(); }
  }

  function mapWcProduct(data) {
    var images = (data.images || []).map(function (img) { return img.src; });
    var front = images[0] || SAMPLE.images.front;
    var back = images[1] || images[0] || SAMPLE.images.back;
    var prices = data.prices || {};
    var decimals = Number(prices.currency_minor_unit);
    if (!Number.isFinite(decimals)) decimals = 2;
    var base = Number.parseInt(prices.price || prices.regular_price || "0", 10);
    if (!Number.isFinite(base)) base = SAMPLE.basePrice;
    else base = base / Math.pow(10, decimals);

    var colors = [];
    var sizes = [];
    (data.attributes || []).forEach(function (attr) {
      var name = String(attr.name || attr.taxonomy || "").toLowerCase();
      var terms = attr.terms || attr.options || [];
      if (/colou?r/.test(name)) {
        terms.forEach(function (term, i) {
          var label = typeof term === "string" ? term : (term.name || term.label || "");
          if (!label) return;
          colors.push({
            id: String(label).toLowerCase().replace(/\s+/g, "-"),
            name: label,
            hex: colorToHex(label),
            group: i < 6 ? "core" : "limited",
            surcharge: i >= 6 ? 100 : 0
          });
        });
      }
      if (/size/.test(name)) {
        terms.forEach(function (term) {
          var label = typeof term === "string" ? term : (term.name || term.label || "");
          if (!label) return;
          sizes.push({
            id: String(label).toLowerCase().replace(/\s+/g, "-"),
            label: label,
            kids: /kid/i.test(label)
          });
        });
      }
    });

    if (!colors.length) colors = SAMPLE.colors.slice();
    if (!sizes.length) sizes = SAMPLE.sizes.slice();

    return {
      id: data.id,
      name: data.name || "Custom Product",
      slug: data.slug || "",
      basePrice: base || SAMPLE.basePrice,
      currencySymbol: prices.currency_prefix || prices.currency_symbol || "Rs ",
      material: (data.short_description || "").replace(/<[^>]+>/g, " ").trim().slice(0, 80) || SAMPLE.material,
      permalink: data.permalink || ("/product/" + (data.slug || "") + "/"),
      images: { front: front, back: back },
      colors: colors,
      sizes: sizes,
      sizeChart: SAMPLE.sizeChart,
      pricing: SAMPLE.pricing,
      textOnlyMode: false
    };
  }

  function bootWithProduct(product) {
    state.product = product;
    var q = params();
    var colorParam = String(q.get("color") || "").toLowerCase();
    var sizeParam = String(q.get("size") || "").toLowerCase();
    var preferredColor = product.colors.filter(function (c) {
      return c.id === colorParam || c.name.toLowerCase() === colorParam;
    })[0] || product.colors.filter(function (c) { return c.group === "core"; })[0] || product.colors[0];
    var preferredSize = product.sizes.filter(function (s) {
      return s.id === sizeParam || s.label.toLowerCase() === sizeParam;
    })[0] || product.sizes.filter(function (s) { return s.id === "m" || s.label === "M"; })[0] || product.sizes[0];

    state.colorId = preferredColor ? preferredColor.id : "";
    state.sizeId = preferredSize ? preferredSize.id : "";
    state.decoration = "screenprint";
    state.delivery = "standard_5";
    state.locations = [];
    state.configs = {};
    state.printMode = product.textOnlyMode ? "full_front" : null;
    state.qty = 1;
    state.side = "front";

    // Restore saved design if present
    try {
      var saved = JSON.parse(localStorage.getItem("vcCzDesign:" + product.id) || "null");
      if (saved && saved.state) {
        Object.keys(saved.state).forEach(function (k) {
          if (k !== "configs") state[k] = saved.state[k];
        });
        // configs without blob previews
        if (saved.state.configs) {
          Object.keys(saved.state.configs).forEach(function (id) {
            state.configs[id] = Object.assign(defaultConfig(id), saved.state.configs[id], { artwork: null });
          });
        }
      }
    } catch (e) {}

    document.getElementById("vcCzLoading").style.display = "none";
    document.getElementById("vcCzApp").style.display = "block";
    document.getElementById("vcCzRoot").setAttribute("aria-busy", "false");
    document.querySelector('a.vc-cz-wa').href = WHATSAPP;
    renderChart();
    bindChrome();
    bindPanel();
    renderAll();
  }

  function loadProduct() {
    var q = params();
    var id = q.get("product_cms") || q.get("product_id") || q.get("id");
    if (!id) {
      bootWithProduct(SAMPLE);
      return;
    }
    fetch(API + "/products/" + encodeURIComponent(id), { credentials: "include" })
      .then(function (res) {
        if (!res.ok) throw new Error("Product not found");
        return res.json();
      })
      .then(function (data) { bootWithProduct(mapWcProduct(data)); })
      .catch(function () {
        var fallback = Object.assign({}, SAMPLE, { id: id });
        bootWithProduct(fallback);
        toast("Using demo product data");
      });
  }

  loadProduct();
})();
</script>
