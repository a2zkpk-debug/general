<!-- ============================================================
     VIBECANO — CUSTOM CHECKOUT PAGE
     Paste this whole file into an Elementor HTML widget.
     Uses WooCommerce Store API.
     ============================================================ -->
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Manrope:wght@700;800&display=swap");

  .vc-checkout,
  .vc-checkout * {
    box-sizing: border-box;
  }

  .vc-checkout {
    --vc-co-text: #0f172a;
    --vc-co-muted: #64748b;
    --vc-co-line: rgba(148, 163, 184, 0.28);
    --vc-co-soft: #f8fafc;
    --vc-co-orange: #f97316;
    --vc-co-blue: #2563eb;
    position: relative;
    overflow: hidden;
    padding: 44px 18px 72px;
    background:
      radial-gradient(circle at 8% 4%, rgba(249, 115, 22, 0.11), transparent 28%),
      radial-gradient(circle at 92% 0%, rgba(37, 99, 235, 0.11), transparent 30%),
      linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    color: var(--vc-co-text);
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .vc-checkout-inner {
    max-width: 1240px;
    margin: 0 auto;
  }

  .vc-checkout-hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 22px;
    align-items: end;
    margin-bottom: 24px;
    padding: clamp(24px, 4vw, 38px);
    border-radius: 34px;
    background:
      radial-gradient(circle at top right, rgba(249, 115, 22, 0.22), transparent 35%),
      linear-gradient(135deg, #07111f 0%, #0f172a 52%, #172554 100%);
    color: #fff;
    box-shadow: 0 30px 80px -58px rgba(15, 23, 42, 0.9);
  }

  .vc-checkout-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding: 8px 13px;
    border: 1px solid rgba(249, 115, 22, 0.35);
    border-radius: 999px;
    background: rgba(249, 115, 22, 0.13);
    color: #fed7aa;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .vc-checkout-kicker::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--vc-co-orange);
    box-shadow: 0 0 0 6px rgba(249, 115, 22, 0.13);
  }

  .vc-checkout-title {
    max-width: 760px;
    margin: 0;
    font-family: Manrope, Inter, sans-serif;
    font-size: clamp(34px, 5vw, 58px);
    font-weight: 800;
    line-height: 1.06;
    letter-spacing: -0.035em;
  }

  .vc-checkout-title span {
    color: #fb923c;
  }

  .vc-checkout-sub {
    max-width: 650px;
    margin: 14px 0 0;
    color: #cbd5e1;
    font-size: 16px;
    font-weight: 650;
    line-height: 1.75;
  }

  .vc-checkout-hero-card {
    min-width: 220px;
    padding: 18px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
  }

  .vc-checkout-hero-card b {
    display: block;
    font-size: 24px;
    font-weight: 900;
  }

  .vc-checkout-hero-card span {
    display: block;
    margin-top: 4px;
    color: rgba(255, 255, 255, 0.66);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .vc-checkout-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    gap: 22px;
    align-items: start;
  }

  .vc-checkout-form {
    display: grid;
    gap: 18px;
    padding: 22px;
    border: 1px solid var(--vc-co-line);
    border-radius: 26px;
    background: #fff;
    box-shadow: 0 22px 58px -48px rgba(15, 23, 42, 0.7);
  }

  .vc-checkout-form h3 {
    margin: 0;
    font-family: Manrope, Inter, sans-serif;
    font-size: 22px;
    font-weight: 800;
  }

  .vc-checkout-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .vc-checkout-field {
    display: grid;
    gap: 7px;
  }

  .vc-checkout-field.is-full {
    grid-column: 1 / -1;
  }

  .vc-checkout-field label {
    color: var(--vc-co-muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .vc-checkout-field input,
  .vc-checkout-field textarea,
  .vc-checkout-field select {
    width: 100%;
    padding: 13px 14px;
    border: 1px solid var(--vc-co-line);
    border-radius: 14px;
    background: var(--vc-co-soft);
    color: var(--vc-co-text);
    font: inherit;
    font-size: 14px;
    font-weight: 650;
    outline: 0;
  }

  .vc-checkout-field textarea {
    min-height: 92px;
    resize: vertical;
  }

  .vc-checkout-payments,
  .vc-checkout-shipping {
    display: grid;
    gap: 10px;
  }

  .vc-checkout-pay,
  .vc-checkout-ship {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    gap: 12px;
    align-items: start;
    padding: 14px;
    border: 1px solid var(--vc-co-line);
    border-radius: 18px;
    background: var(--vc-co-soft);
    cursor: pointer;
    transition: border-color 0.18s ease, background 0.18s ease;
  }

  .vc-checkout-pay.is-active,
  .vc-checkout-ship.is-active {
    border-color: var(--vc-co-orange);
    background: #fff7ed;
  }

  .vc-checkout-pay.is-disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .vc-checkout-pay input,
  .vc-checkout-ship input {
    margin-top: 3px;
  }

  .vc-checkout-pay b,
  .vc-checkout-ship b {
    display: block;
    margin-bottom: 3px;
    font-size: 15px;
    font-weight: 800;
  }

  .vc-checkout-pay span,
  .vc-checkout-ship span {
    display: block;
    color: var(--vc-co-muted);
    font-size: 13px;
    font-weight: 650;
    line-height: 1.55;
  }

  .vc-checkout-bank {
    display: none;
    margin-top: 12px;
    padding: 14px;
    border: 1px dashed var(--vc-co-line);
    border-radius: 16px;
    background: #fff;
    color: var(--vc-co-muted);
    font-size: 13px;
    font-weight: 650;
    line-height: 1.65;
  }

  .vc-checkout-bank.is-visible {
    display: block;
  }

  .vc-checkout-receipt {
    display: none;
    margin-top: 12px;
  }

  .vc-checkout-receipt.is-visible {
    display: grid;
    gap: 8px;
  }

  .vc-checkout-receipt label {
    color: var(--vc-co-muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .vc-checkout-receipt input[type="file"] {
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--vc-co-line);
    border-radius: 14px;
    background: #fff;
    font-size: 13px;
  }

  .vc-checkout-receipt-name {
    color: #16a34a;
    font-size: 12px;
    font-weight: 800;
  }

  .vc-checkout-summary {
    position: sticky;
    top: 18px;
    padding: 20px;
    border: 1px solid var(--vc-co-line);
    border-radius: 26px;
    background:
      radial-gradient(circle at top right, rgba(249, 115, 22, 0.08), transparent 38%),
      #fff;
    box-shadow: 0 26px 70px -56px rgba(15, 23, 42, 0.9);
  }

  .vc-checkout-summary h3 {
    margin: 0 0 16px;
    font-family: Manrope, Inter, sans-serif;
    font-size: 22px;
    font-weight: 800;
  }

  .vc-order-list {
    display: grid;
    gap: 12px;
    margin-bottom: 14px;
  }

  .vc-order-item {
    display: grid;
    grid-template-columns: 64px minmax(0, 1fr) auto;
    gap: 12px;
    align-items: start;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--vc-co-line);
  }

  .vc-order-item:last-child {
    border-bottom: 0;
    padding-bottom: 0;
  }

  .vc-order-img {
    overflow: hidden;
    width: 64px;
    height: 64px;
    border-radius: 14px;
    background: var(--vc-co-soft);
  }

  .vc-order-img img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .vc-order-name {
    margin: 0 0 4px;
    font-family: Manrope, Inter, sans-serif;
    font-size: 14px;
    font-weight: 800;
    line-height: 1.3;
  }

  .vc-order-meta {
    margin-top: 2px;
    color: var(--vc-co-muted);
    font-size: 11px;
    font-weight: 700;
    line-height: 1.35;
  }

  .vc-order-price {
    color: var(--vc-co-text);
    font-size: 14px;
    font-weight: 800;
    white-space: nowrap;
  }

  .vc-checkout-row {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    padding: 9px 0;
    color: var(--vc-co-muted);
    font-size: 14px;
    font-weight: 700;
  }

  .vc-checkout-row.total {
    margin-top: 10px;
    padding-top: 16px;
    border-top: 1px dashed var(--vc-co-line);
    color: var(--vc-co-text);
    font-size: 19px;
    font-weight: 900;
  }

  .vc-checkout-submit {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 50px;
    margin-top: 14px;
    border: 0;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--vc-co-orange), #ec4899);
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 900;
    box-shadow: 0 22px 38px -26px rgba(249, 115, 22, 0.95);
  }

  .vc-checkout-submit:disabled {
    cursor: wait;
    opacity: 0.7;
  }

  .vc-checkout-whatsapp {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 46px;
    margin-top: 10px;
    border: 1px solid var(--vc-co-line);
    border-radius: 16px;
    background: #fff;
    color: var(--vc-co-text);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 900;
  }

  .vc-checkout-whatsapp:disabled {
    cursor: wait;
    opacity: 0.7;
  }

  .vc-checkout-back {
    display: inline-flex;
    justify-content: center;
    width: 100%;
    margin-top: 12px;
    color: var(--vc-co-muted);
    font-size: 13px;
    font-weight: 800;
    text-decoration: none;
  }

  .vc-checkout-empty,
  .vc-checkout-loading {
    padding: 48px 20px;
    border: 1px dashed var(--vc-co-line);
    border-radius: 26px;
    background: #fff;
    color: var(--vc-co-muted);
    text-align: center;
    box-shadow: 0 22px 58px -48px rgba(15, 23, 42, 0.7);
  }

  .vc-checkout-empty h3 {
    margin: 0 0 8px;
    color: var(--vc-co-text);
    font-family: Manrope, Inter, sans-serif;
    font-size: 24px;
    font-weight: 800;
  }

  .vc-checkout-empty p {
    margin: 0 auto 18px;
    max-width: 440px;
    font-size: 14px;
    font-weight: 650;
    line-height: 1.6;
  }

  .vc-checkout-empty a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    padding: 0 18px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--vc-co-orange), #ec4899);
    color: #fff;
    font-size: 14px;
    font-weight: 900;
    text-decoration: none;
  }

  .vc-checkout-toast {
    position: fixed;
    right: 22px;
    bottom: 22px;
    z-index: 100000;
    padding: 13px 18px;
    border-radius: 999px;
    background: #0f172a;
    color: #fff;
    box-shadow: 0 20px 40px -28px rgba(0, 0, 0, 0.75);
    font-size: 14px;
    font-weight: 800;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.28s ease, transform 0.28s ease;
    pointer-events: none;
  }

  .vc-checkout-toast.is-showing {
    opacity: 1;
    transform: translateY(0);
  }

  .vc-checkout-free-note {
    margin: 0;
    padding: 10px 12px;
    border-radius: 12px;
    background: #ecfdf5;
    color: #047857;
    font-size: 12px;
    font-weight: 800;
    line-height: 1.5;
  }

  @media (max-width: 960px) {
    .vc-checkout-hero,
    .vc-checkout-shell {
      grid-template-columns: 1fr;
    }

    .vc-checkout-summary {
      position: static;
    }
  }

  @media (max-width: 620px) {
    .vc-checkout {
      padding: 28px 14px 58px;
    }

    .vc-checkout-grid {
      grid-template-columns: 1fr;
    }

    .vc-order-item {
      grid-template-columns: 56px minmax(0, 1fr);
    }

    .vc-order-price {
      grid-column: 2;
      justify-self: start;
    }
  }
</style>

<section class="vc-checkout" id="vcCheckoutSection">
  <div class="vc-checkout-inner">
    <div class="vc-checkout-hero">
      <div>
        <span class="vc-checkout-kicker">Vibecano checkout</span>
        <h1 class="vc-checkout-title">Complete your <span>order</span> securely.</h1>
        <p class="vc-checkout-sub">Enter your delivery details, choose shipping and payment, then confirm your order on WhatsApp.</p>
      </div>
      <div class="vc-checkout-hero-card">
        <b id="vcCheckoutTotal">—</b>
        <span>Order total</span>
      </div>
    </div>

    <div id="vcCheckoutRoot">
      <div class="vc-checkout-loading">Loading checkout...</div>
    </div>
  </div>
</section>

<div id="vcCheckoutToast" class="vc-checkout-toast"></div>

<script>
(function () {
  "use strict";

  var API = "/wp-json/wc/store/v1";
  var CART = "/cart/";
  var SHOP = "/shop/";
  var WHATSAPP = "923332929254";
  var CART_TOKEN_KEY = "vcWcCartToken";
  var SHIPPING_NORMAL = 250;
  var FREE_SHIPPING_MIN = 5000;
  var CUSTOM_PRODUCT_IDS = [];

  var root = document.getElementById("vcCheckoutRoot");
  var toastEl = document.getElementById("vcCheckoutToast");
  var totalEl = document.getElementById("vcCheckoutTotal");
  var nonce = "";
  var cart = null;
  var receipt = null;

  if (!root || !toastEl || !window.fetch) {
    return;
  }

  function $(selector, context) {
    return (context || document).querySelector(selector);
  }

  function $all(selector, context) {
    return Array.prototype.slice.call((context || document).querySelectorAll(selector));
  }

  function bootstrapCartTokenFromUrl() {
    try {
      var params = new URLSearchParams(window.location.search);
      var session = params.get("session");
      if (session) {
        sessionStorage.setItem(CART_TOKEN_KEY, session);
      }
    } catch (error) {}
  }

  bootstrapCartTokenFromUrl();

  function getStoredCartToken() {
    try {
      return sessionStorage.getItem(CART_TOKEN_KEY) || "";
    } catch (error) {
      return "";
    }
  }

  function storeCartToken(response) {
    var token = response.headers.get("Cart-Token");
    if (!token) return getStoredCartToken();
    try {
      sessionStorage.setItem(CART_TOKEN_KEY, token);
    } catch (error) {}
    return token;
  }

  function getCartHeaders() {
    var headers = {
      "Content-Type": "application/json",
      "Nonce": nonce,
      "X-WC-Store-API-Nonce": nonce
    };
    var token = getStoredCartToken();
    if (token) headers["Cart-Token"] = token;
    return headers;
  }

  function selectedPayment() {
    var checked = $('input[name="vcPay"]:checked');
    return checked ? checked.value : "cod";
  }

  function selectedShipping() {
    var checked = $('input[name="vcShip"]:checked');
    return checked ? checked.value : "standard";
  }

  function paymentName(method) {
    method = method || selectedPayment();
    if (method === "cod") return "Cash on Delivery";
    if (method === "easypaisa") return "EasyPaisa";
    if (method === "jazzcash") return "JazzCash";
    if (method === "bank") return "Bank Transfer";
    if (method === "bacs") return "Bank Transfer / JazzCash / EasyPaisa";
    if (method === "cheque") return "Cheque";
    return method;
  }

  function wcPaymentMethod(method) {
    if (method === "cod") return "cod";
    if (method === "bank" || method === "cheque") return method === "cheque" ? "cheque" : "bacs";
    if (method === "easypaisa" || method === "jazzcash") return "bacs";
    return method;
  }

  function showToast(message) {
    toastEl.textContent = message;
    toastEl.classList.add("is-showing");
    setTimeout(function () {
      toastEl.classList.remove("is-showing");
    }, 2300);
  }

  function fetchCart() {
    var headers = {};
    var token = getStoredCartToken();
    if (token) headers["Cart-Token"] = token;

    return fetch(API + "/cart", { credentials: "include", headers: headers }).then(function (response) {
      nonce = response.headers.get("Nonce") || response.headers.get("X-WC-Store-API-Nonce") || nonce;
      storeCartToken(response);
      if (!response.ok) throw new Error("Cart request failed");
      return response.json();
    });
  }

  function updateCustomer(payload) {
    return fetch(API + "/cart/update-customer", {
      method: "POST",
      credentials: "include",
      headers: getCartHeaders(),
      body: JSON.stringify(payload)
    }).then(function (response) {
      nonce = response.headers.get("Nonce") || response.headers.get("X-WC-Store-API-Nonce") || nonce;
      storeCartToken(response);
      return response.json().then(function (data) {
        if (!response.ok) {
          throw new Error(data && data.message ? data.message : "Could not update customer details");
        }
        return data;
      });
    });
  }

  function checkoutOrder(payload) {
    return fetch(API + "/checkout", {
      method: "POST",
      credentials: "include",
      headers: getCartHeaders(),
      body: JSON.stringify(payload)
    }).then(function (response) {
      nonce = response.headers.get("Nonce") || response.headers.get("X-WC-Store-API-Nonce") || nonce;
      storeCartToken(response);
      return response.json().then(function (data) {
        if (!response.ok) {
          throw new Error(data && data.message ? data.message : "Checkout failed");
        }
        return data;
      });
    });
  }

  function hasCustomItems(items) {
    items = items || (cart && cart.items) || [];
    return items.some(function (item) {
      if (CUSTOM_PRODUCT_IDS.indexOf(Number(item.id)) >= 0) return true;
      if (item.item_data && item.item_data.length) return true;
      return false;
    });
  }

  function checkoutTotals(cartData) {
    var totals = cartData && cartData.totals ? cartData.totals : {};
    var minor = Number.isFinite(Number(totals.currency_minor_unit)) ? Number(totals.currency_minor_unit) : 0;
    var prefix = totals.currency_prefix || totals.currency_symbol || "Rs ";
    var subtotalRaw = Number(totals.total_items || 0);
    var discountRaw = Number(totals.total_discount || 0);
    var subtotal = subtotalRaw / Math.pow(10, minor);
    var discount = discountRaw / Math.pow(10, minor);
    var apiShipping = Number(totals.total_shipping || 0) / Math.pow(10, minor);
    var shipping = apiShipping > 0 ? apiShipping : (subtotal - discount >= FREE_SHIPPING_MIN ? 0 : SHIPPING_NORMAL);
    if (selectedShipping() === "pickup") shipping = 0;
    var total = subtotal - discount + shipping + Number(totals.total_tax || 0) / Math.pow(10, minor);
    return {
      minor: minor,
      prefix: prefix,
      subtotalRaw: subtotalRaw,
      subtotal: subtotal,
      discount: discount,
      discountRaw: discountRaw,
      shipping: shipping,
      tax: Number(totals.total_tax || 0) / Math.pow(10, minor),
      total: total,
      freeShipping: subtotal - discount >= FREE_SHIPPING_MIN
    };
  }

  function fitCheckoutToViewport() {
    var section = $("#vcCheckoutSection");
    if (!section) return;
    var viewport = window.innerHeight || document.documentElement.clientHeight || 0;
    section.style.minHeight = viewport > 640 ? "" : viewport + "px";
  }

  function normalizeMetaLabel(raw) {
    var label = String(raw || "")
      .replace(/^attribute_/i, "")
      .replace(/^pa_/i, "")
      .replace(/[-_]/g, " ")
      .trim();

    if (/^size$/i.test(label)) return "Size";
    if (/^colou?r$/i.test(label)) return "Color";
    if (!label) return "Detail";

    return label.split(/\s+/).map(function (word) {
      return word.charAt(0).toUpperCase() + word.slice(1);
    }).join(" ");
  }

  function getItemMetaLines(item) {
    var lines = [];
    var seen = {};

    function pushLine(label, value) {
      var cleanLabel = normalizeMetaLabel(label);
      var cleanValue = String(value || "").trim();
      if (!cleanValue) return;

      var key = cleanLabel.toLowerCase() + "::" + cleanValue.toLowerCase();
      if (seen[key]) return;
      seen[key] = true;
      lines.push({ label: cleanLabel, value: cleanValue });
    }

    if (item && Array.isArray(item.variation)) {
      item.variation.forEach(function (entry) {
        pushLine(entry && entry.attribute, entry && entry.value);
      });
    }

    if (item && Array.isArray(item.item_data)) {
      item.item_data.forEach(function (entry) {
        pushLine(
          (entry && (entry.name || entry.key || entry.attribute)) || "",
          (entry && (entry.display || entry.value)) || ""
        );
      });
    }

    return lines;
  }

  function formatItemMetaInline(item) {
    var parts = ["Qty: " + Number(item.quantity || 1)];
    getItemMetaLines(item).forEach(function (line) {
      parts.push(line.label + ": " + line.value);
    });
    return parts.join(" · ");
  }

  function formatItemMetaForNote(item) {
    var meta = getItemMetaLines(item).map(function (line) {
      return line.label + ": " + line.value;
    }).join(", ");
    return (item.name || "Product") + " x" + Number(item.quantity || 1) + (meta ? " (" + meta + ")" : "");
  }

  function buildCustomerNote(formData, payLabel, receiptName) {
    var computed = checkoutTotals(cart);
    var lines = [
      "Vibecano custom checkout",
      "Payment: " + payLabel,
      "Shipping: " + (selectedShipping() === "pickup" ? "Self pickup" : "Standard delivery")
    ];

    if (receiptName) {
      lines.push("Receipt file: " + receiptName);
    }

    if (formData.note) {
      lines.push("Customer note: " + formData.note);
    }

    lines.push("Items:");
    (cart.items || []).forEach(function (item) {
      lines.push("- " + formatItemMetaForNote(item));
    });

    lines.push(
      "Subtotal: " + formatMoney(computed.subtotalRaw, computed.minor, computed.prefix),
      "Shipping: " + (computed.shipping > 0 ? formatMoney(Math.round(computed.shipping * Math.pow(10, computed.minor)), computed.minor, computed.prefix) : "Free"),
      "Total: " + formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix)
    );

    return lines.join("\n");
  }

  function buildWhatsAppMessage(order, formData, payLabel) {
    var computed = checkoutTotals(cart);
    var lines = [
      "New Vibecano Order",
      "Order #" + (order && (order.order_id || order.id) ? (order.order_id || order.id) : "Pending"),
      "",
      "Customer: " + formData.firstName + " " + formData.lastName,
      "Phone: " + formData.phone,
      "Email: " + (formData.email || "—"),
      "Address: " + formData.address + ", " + formData.city + ", " + formData.province + " " + formData.postcode,
      "Shipping: " + (selectedShipping() === "pickup" ? "Self pickup" : "Standard delivery"),
      "Payment: " + payLabel
    ];

    if (selectedPayment() !== "cod" && receipt && receipt.name) {
      lines.push("Receipt: " + receipt.name + " (please attach the uploaded receipt image/file)");
    }

    if (formData.note) {
      lines.push("Notes: " + formData.note);
    }

    lines.push("", "Items:");
    (cart.items || []).forEach(function (item) {
      lines.push(
        "• " + (item.name || "Product") +
        " ×" + Number(item.quantity || 1) +
        " — " + formatMoney(item.totals && item.totals.line_total, computed.minor, computed.prefix)
      );
      getItemMetaLines(item).forEach(function (meta) {
        lines.push("  ↳ " + meta.label + ": " + meta.value);
      });
    });

    lines.push(
      "",
      "Subtotal: " + formatMoney(computed.subtotalRaw, computed.minor, computed.prefix),
      "Shipping: " + (computed.shipping > 0 ? formatMoney(Math.round(computed.shipping * Math.pow(10, computed.minor)), computed.minor, computed.prefix) : "Free"),
      "Total: " + formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix)
    );

    return lines.join("\n");
  }

  function openWhatsAppWithReceipt(message) {
    var waUrl = "https://wa.me/" + WHATSAPP + "?text=" + encodeURIComponent(message);

    if (receipt && receipt.file && navigator.share) {
      try {
        var sharePayload = { text: message, files: [receipt.file] };
        if (!navigator.canShare || navigator.canShare(sharePayload)) {
          navigator.share(sharePayload).catch(function () {
            window.open(waUrl, "_blank");
          });
          return;
        }
      } catch (error) {}
    }

    window.open(waUrl, "_blank");

    if (
      receipt &&
      receipt.type &&
      receipt.type.indexOf("image/") === 0 &&
      receipt.dataUrl &&
      (!navigator.share || !navigator.canShare)
    ) {
      setTimeout(function () {
        var receiptWindow = window.open("", "_blank");
        if (!receiptWindow) return;
        receiptWindow.document.write(
          "<!doctype html><html><head><meta charset=\"utf-8\"><title>Attach payment receipt</title></head>" +
          "<body style=\"font-family:Inter,sans-serif;padding:24px;max-width:720px;margin:0 auto;text-align:center;color:#0f172a\">" +
          "<h2 style=\"margin:0 0 10px\">Payment receipt</h2>" +
          "<p style=\"color:#64748b;line-height:1.6\">WhatsApp links cannot attach files automatically. Long-press or save this image, then attach it in your WhatsApp chat.</p>" +
          "<img src=\"" + receipt.dataUrl + "\" alt=\"Payment receipt\" style=\"max-width:100%;height:auto;border-radius:16px;border:1px solid #e2e8f0;margin:18px 0\">" +
          "<p style=\"font-size:13px;color:#64748b\">File: " + escapeHtml(receipt.name || "receipt") + "</p>" +
          "</body></html>"
        );
        receiptWindow.document.close();
      }, 400);
    }
  }

  function readFormData() {
    return {
      firstName: String(($("#vcFn") && $("#vcFn").value) || "").trim(),
      lastName: String(($("#vcLn") && $("#vcLn").value) || "").trim(),
      phone: String(($("#vcPhone") && $("#vcPhone").value) || "").trim(),
      email: String(($("#vcEmail") && $("#vcEmail").value) || "").trim(),
      address: String(($("#vcAddress") && $("#vcAddress").value) || "").trim(),
      city: String(($("#vcCity") && $("#vcCity").value) || "").trim(),
      province: String(($("#vcProvince") && $("#vcProvince").value) || "").trim(),
      postcode: String(($("#vcPostcode") && $("#vcPostcode").value) || "").trim(),
      note: String(($("#vcNote") && $("#vcNote").value) || "").trim()
    };
  }

  function validateForm(formData) {
    if (!formData.firstName) return "Please enter your first name.";
    if (!formData.lastName) return "Please enter your last name.";
    if (!formData.phone) return "Please enter your phone number.";
    if (!formData.address) return "Please enter your delivery address.";
    if (!formData.city) return "Please enter your city.";
    if (!formData.province) return "Please enter your province.";
    if (selectedPayment() !== "cod" && !receipt) {
      return "Please upload your payment receipt for the selected payment method.";
    }
    return "";
  }

  function placeOrder() {
    var formData = readFormData();
    var validationError = validateForm(formData);
    if (validationError) {
      showToast(validationError);
      return;
    }

    var submitButton = $("#vcPlaceOrder");
    var whatsappButton = $("#vcWhatsAppBtn");
    if (submitButton) {
      submitButton.disabled = true;
      submitButton.textContent = "Placing order...";
    }
    if (whatsappButton) whatsappButton.disabled = true;

    var payMethod = selectedPayment();
    var payLabel = paymentName(payMethod);
    var receiptName = receipt && receipt.name ? receipt.name : "";
    var customerNote = buildCustomerNote(formData, payLabel, receiptName);

    var addressPayload = {
      billing_address: {
        first_name: formData.firstName,
        last_name: formData.lastName,
        company: "",
        address_1: formData.address,
        address_2: "",
        city: formData.city,
        state: formData.province || "PB",
        postcode: formData.postcode,
        country: "PK",
        email: formData.email,
        phone: formData.phone
      },
      shipping_address: {
        first_name: formData.firstName,
        last_name: formData.lastName,
        company: "",
        address_1: formData.address,
        address_2: "",
        city: formData.city,
        state: formData.province || "PB",
        postcode: formData.postcode,
        country: "PK",
        phone: formData.phone
      }
    };

    updateCustomer(addressPayload)
      .then(function (updatedCart) {
        cart = updatedCart;
        return checkoutOrder({
          billing_address: addressPayload.billing_address,
          shipping_address: addressPayload.shipping_address,
          payment_method: wcPaymentMethod(payMethod),
          customer_note: customerNote
        });
      })
      .then(function (order) {
        var message = buildWhatsAppMessage(order, formData, payLabel);
        openWhatsAppWithReceipt(message);
        showToast("Order placed — opening WhatsApp");
        renderSuccess(order);
      })
      .catch(function (error) {
        showToast(error.message || "Could not place order");
      })
      .finally(function () {
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.textContent = "Place Order";
        }
        if (whatsappButton) whatsappButton.disabled = false;
      });
  }

  function enforcePaymentRules() {
    var custom = hasCustomItems();
    $all('input[name="vcPay"]').forEach(function (radio) {
      var label = radio.closest(".vc-checkout-pay");
      if (radio.value === "cod") {
        radio.disabled = custom;
        if (label) label.classList.toggle("is-disabled", custom);
      }
      if (label) label.classList.toggle("is-active", radio.checked);
    });

    if (custom && selectedPayment() === "cod") {
      var fallback = $('input[name="vcPay"][value="easypaisa"]') || $('input[name="vcPay"]:not([value="cod"])');
      if (fallback) fallback.checked = true;
    }

    var pay = selectedPayment();
    var bankDetails = $("#vcCoBankDetails");
    if (bankDetails) bankDetails.classList.toggle("is-visible", pay !== "cod");

    $all(".vc-checkout-receipt").forEach(function (node) {
      node.classList.remove("is-visible");
    });

    if (pay === "easypaisa" && $("#vcReceiptEpWrap")) $("#vcReceiptEpWrap").classList.add("is-visible");
    if (pay === "jazzcash" && $("#vcReceiptJcWrap")) $("#vcReceiptJcWrap").classList.add("is-visible");
    if (pay === "bank" && $("#vcReceiptBankWrap")) $("#vcReceiptBankWrap").classList.add("is-visible");

    updateSummaryTotals();
  }

  function updateSummaryTotals() {
    if (!cart) return;
    var computed = checkoutTotals(cart);
    var shippingEl = $("#vcCoShippingAmount");
    var totalElSummary = $("#vcCoTotalAmount");
    var freeNote = $("#vcCoFreeShippingNote");

    if (shippingEl) {
      shippingEl.textContent = computed.shipping > 0
        ? formatMoney(Math.round(computed.shipping * Math.pow(10, computed.minor)), computed.minor, computed.prefix)
        : "Free";
    }
    if (totalElSummary) {
      totalElSummary.textContent = formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix);
    }
    if (totalEl) {
      totalEl.textContent = formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix);
    }
    if (freeNote) {
      freeNote.hidden = !computed.freeShipping;
    }
  }

  function setupPayments() {
    $all('input[name="vcPay"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        receipt = null;
        $all(".vc-checkout-receipt-name").forEach(function (node) {
          node.textContent = "";
        });
        ["vcReceiptEp", "vcReceiptJc", "vcReceiptBank"].forEach(function (id) {
          var input = $("#" + id);
          if (input) input.value = "";
        });
        enforcePaymentRules();
      });
    });

    $all('input[name="vcShip"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        $all(".vc-checkout-ship").forEach(function (node) {
          node.classList.toggle("is-active", node.querySelector("input") && node.querySelector("input").checked);
        });
        updateSummaryTotals();
      });
    });

    function bindReceiptInput(inputId, nameElId) {
      var input = $("#" + inputId);
      var nameEl = $("#" + nameElId);
      if (!input) return;
      input.addEventListener("change", function (event) {
        var file = event.target.files && event.target.files[0];
        if (!file) {
          receipt = null;
          if (nameEl) nameEl.textContent = "";
          return;
        }
        var reader = new FileReader();
        reader.onload = function (loadEvent) {
          receipt = {
            name: file.name,
            type: file.type,
            file: file,
            dataUrl: loadEvent.target.result
          };
          if (nameEl) nameEl.textContent = "Selected: " + file.name;
        };
        reader.readAsDataURL(file);
      });
    }

    bindReceiptInput("vcReceiptEp", "vcReceiptEpName");
    bindReceiptInput("vcReceiptJc", "vcReceiptJcName");
    bindReceiptInput("vcReceiptBank", "vcReceiptBankName");

    var placeButton = $("#vcPlaceOrder");
    var whatsappButton = $("#vcWhatsAppBtn");
    if (placeButton) placeButton.addEventListener("click", placeOrder);
    if (whatsappButton) whatsappButton.addEventListener("click", placeOrder);

    var form = $("#vcCheckoutForm");
    if (form) {
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        placeOrder();
      });
    }
  }

  function renderPaymentOption(method, isActive) {
    return [
      '<label class="vc-checkout-pay' + (isActive ? " is-active" : "") + '">',
        '<input type="radio" name="vcPay" id="vcPay' + escapeAttr(method) + '" value="' + escapeAttr(method) + '"' + (isActive ? " checked" : "") + '>',
        '<div>',
          '<b>' + escapeHtml(paymentName(method)) + '</b>',
          '<span>' + escapeHtml(getPaymentDescription(method)) + '</span>',
        '</div>',
      '</label>'
    ].join("");
  }

  function getPaymentDescription(method) {
    if (method === "cod") return "Pay when your order arrives at your doorstep.";
    if (method === "easypaisa") return "Send payment via EasyPaisa, then upload your receipt.";
    if (method === "jazzcash") return "Send payment via JazzCash, then upload your receipt.";
    if (method === "bank") return "Transfer to our bank account, then upload your receipt.";
    return "Complete payment and upload proof below.";
  }

  function renderShippingOption(method, isActive, label, description) {
    return [
      '<label class="vc-checkout-ship' + (isActive ? " is-active" : "") + '">',
        '<input type="radio" name="vcShip" id="vcShip' + escapeAttr(method) + '" value="' + escapeAttr(method) + '"' + (isActive ? " checked" : "") + '>',
        '<div>',
          '<b>' + escapeHtml(label) + '</b>',
          '<span>' + escapeHtml(description) + '</span>',
        '</div>',
      '</label>'
    ].join("");
  }

  function render(cartData) {
    cart = cartData;
    var items = cart && Array.isArray(cart.items) ? cart.items : [];
    var computed = checkoutTotals(cart);
    var custom = hasCustomItems(items);
    var defaultPayment = custom ? "easypaisa" : "cod";

    totalEl.textContent = formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix);

    if (!items.length) {
      renderEmpty();
      return;
    }

    root.innerHTML = [
      '<div class="vc-checkout-shell">',
        '<form class="vc-checkout-form" id="vcCheckoutForm" novalidate>',
          '<h3>Delivery details</h3>',
          '<div class="vc-checkout-grid">',
            '<div class="vc-checkout-field"><label for="vcFn">First name</label><input id="vcFn" type="text" autocomplete="given-name" required></div>',
            '<div class="vc-checkout-field"><label for="vcLn">Last name</label><input id="vcLn" type="text" autocomplete="family-name" required></div>',
            '<div class="vc-checkout-field"><label for="vcPhone">WhatsApp / phone</label><input id="vcPhone" type="tel" autocomplete="tel" required></div>',
            '<div class="vc-checkout-field"><label for="vcEmail">Email (optional)</label><input id="vcEmail" type="email" autocomplete="email"></div>',
            '<div class="vc-checkout-field is-full"><label for="vcAddress">Complete address</label><input id="vcAddress" type="text" autocomplete="street-address" required></div>',
            '<div class="vc-checkout-field"><label for="vcCity">City</label><input id="vcCity" type="text" autocomplete="address-level2" required></div>',
            '<div class="vc-checkout-field"><label for="vcProvince">Province</label><input id="vcProvince" type="text" autocomplete="address-level1" required></div>',
            '<div class="vc-checkout-field"><label for="vcPostcode">Postcode</label><input id="vcPostcode" type="text" autocomplete="postal-code"></div>',
            '<div class="vc-checkout-field is-full"><label for="vcNote">Order notes (optional)</label><textarea id="vcNote" placeholder="Delivery instructions, gift message, etc."></textarea></div>',
          '</div>',
          '<h3>Shipping method</h3>',
          '<div class="vc-checkout-shipping" id="vcCoShipping">',
            renderShippingOption("standard", true, "Standard delivery", "Rs " + SHIPPING_NORMAL + " nationwide (free on orders over Rs " + FREE_SHIPPING_MIN.toLocaleString("en-PK") + ")"),
            renderShippingOption("pickup", false, "Self pickup", "Collect from our studio — free"),
          '</div>',
          '<h3>Payment method</h3>',
          '<div class="vc-checkout-payments" id="vcCoPayments">',
            renderPaymentOption("cod", !custom && defaultPayment === "cod"),
            renderPaymentOption("easypaisa", defaultPayment === "easypaisa"),
            renderPaymentOption("jazzcash", defaultPayment === "jazzcash"),
            renderPaymentOption("bank", defaultPayment === "bank"),
          '</div>',
          '<div class="vc-checkout-bank' + (defaultPayment !== "cod" ? " is-visible" : "") + '" id="vcCoBankDetails">',
            '<strong>Bank / wallet details</strong><br>',
            'Account Title: Vibecano<br>',
            'Bank: Meezan Bank<br>',
            'Account #: 01234567890123<br>',
            'JazzCash / EasyPaisa: 0333-2929254',
          '</div>',
          '<div class="vc-checkout-receipt' + (defaultPayment === "easypaisa" ? " is-visible" : "") + '" id="vcReceiptEpWrap">',
            '<label for="vcReceiptEp">EasyPaisa receipt</label>',
            '<input id="vcReceiptEp" type="file" accept="image/*,.pdf">',
            '<div class="vc-checkout-receipt-name" id="vcReceiptEpName"></div>',
          '</div>',
          '<div class="vc-checkout-receipt' + (defaultPayment === "jazzcash" ? " is-visible" : "") + '" id="vcReceiptJcWrap">',
            '<label for="vcReceiptJc">JazzCash receipt</label>',
            '<input id="vcReceiptJc" type="file" accept="image/*,.pdf">',
            '<div class="vc-checkout-receipt-name" id="vcReceiptJcName"></div>',
          '</div>',
          '<div class="vc-checkout-receipt' + (defaultPayment === "bank" ? " is-visible" : "") + '" id="vcReceiptBankWrap">',
            '<label for="vcReceiptBank">Bank transfer receipt</label>',
            '<input id="vcReceiptBank" type="file" accept="image/*,.pdf">',
            '<div class="vc-checkout-receipt-name" id="vcReceiptBankName"></div>',
          '</div>',
        '</form>',
        renderSummary(items, computed),
      '</div>'
    ].join("");

    setupPayments();
    enforcePaymentRules();
    fitCheckoutToViewport();
  }

  function renderSummary(items, computed) {
    return [
      '<aside class="vc-checkout-summary">',
        '<h3>Order Summary</h3>',
        '<div class="vc-order-list">',
          items.map(function (item) { return renderItem(item, computed.minor, computed.prefix); }).join(""),
        '</div>',
        computed.freeShipping ? '<p class="vc-checkout-free-note" id="vcCoFreeShippingNote">You qualify for free shipping!</p>' : '<p class="vc-checkout-free-note" id="vcCoFreeShippingNote" hidden>You qualify for free shipping!</p>',
        '<div class="vc-checkout-row"><span>Subtotal</span><span>' + formatMoney(computed.subtotalRaw, computed.minor, computed.prefix) + '</span></div>',
        computed.discount > 0 ? '<div class="vc-checkout-row" style="color:#16a34a"><span>Discount</span><span>− ' + formatMoney(computed.discountRaw, computed.minor, computed.prefix) + '</span></div>' : "",
        '<div class="vc-checkout-row"><span>Shipping</span><span id="vcCoShippingAmount">' + (computed.shipping > 0 ? formatMoney(Math.round(computed.shipping * Math.pow(10, computed.minor)), computed.minor, computed.prefix) : "Free") + '</span></div>',
        computed.tax > 0 ? '<div class="vc-checkout-row"><span>Tax</span><span>' + formatMoney(Math.round(computed.tax * Math.pow(10, computed.minor)), computed.minor, computed.prefix) + '</span></div>' : "",
        '<div class="vc-checkout-row total"><span>Total</span><span id="vcCoTotalAmount">' + formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix) + '</span></div>',
        '<button class="vc-checkout-submit" type="button" id="vcPlaceOrder">Place Order</button>',
        '<button class="vc-checkout-whatsapp" type="button" id="vcWhatsAppBtn">Confirm on WhatsApp</button>',
        '<a class="vc-checkout-back" href="' + CART + '">← Back to cart</a>',
      '</aside>'
    ].join("");
  }

  function renderItem(item, minor, prefix) {
    var image = item.images && item.images[0] ? item.images[0].src : "";
    return [
      '<article class="vc-order-item">',
        '<div class="vc-order-img">',
          image ? '<img src="' + escapeAttr(image) + '" alt="' + escapeAttr(item.name || "Product") + '">' : "",
        '</div>',
        '<div>',
          '<h4 class="vc-order-name">' + escapeHtml(item.name || "Product") + '</h4>',
          '<div class="vc-order-meta">' + escapeHtml(formatItemMetaInline(item)) + '</div>',
        '</div>',
        '<div class="vc-order-price">' + formatMoney(item.totals && item.totals.line_total, minor, prefix) + '</div>',
      '</article>'
    ].join("");
  }

  function renderEmpty() {
    totalEl.textContent = "—";
    root.innerHTML = [
      '<div class="vc-checkout-empty">',
        '<h3>Your cart is empty</h3>',
        '<p>Add products to your cart before checkout.</p>',
        '<a href="' + SHOP + '">Start Shopping</a>',
      '</div>'
    ].join("");
  }

  function renderSuccess(order) {
    var orderId = order && (order.order_id || order.id) ? (order.order_id || order.id) : "";
    root.innerHTML = [
      '<div class="vc-checkout-empty">',
        '<h3>Order placed successfully</h3>',
        '<p>' + (orderId ? "Order #" + escapeHtml(String(orderId)) + " has been created. " : "") + 'Continue in WhatsApp to confirm payment and delivery details.</p>',
        '<a href="' + SHOP + '">Continue Shopping</a>',
      '</div>'
    ].join("");
  }

  function formatMoney(raw, minor, prefix) {
    var value = Number(raw || 0) / Math.pow(10, minor);
    return prefix + value.toLocaleString("en-PK", {
      minimumFractionDigits: minor > 0 ? 2 : 0,
      maximumFractionDigits: minor > 0 ? 2 : 0
    }).replace(/\.00$/, "");
  }

  function escapeHtml(value) {
    return String(value || "").replace(/[&<>"']/g, function (character) {
      return {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[character];
    });
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, "&#96;");
  }

  window.addEventListener("resize", fitCheckoutToViewport);

  fetchCart()
    .then(render)
    .catch(function () {
      root.innerHTML = '<div class="vc-checkout-empty"><h3>Could not load checkout</h3><p>Please refresh the page or return to your cart.</p><a href="' + CART + '">Back to cart</a></div>';
    });
})();
</script>
