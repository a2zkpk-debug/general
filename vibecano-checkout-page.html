<!-- ============================================================
     VIBECANO — CUSTOM CHECKOUT PAGE (responsive)
     Paste this whole file into an Elementor HTML widget.
     Uses WooCommerce Store API + optional WhatsApp confirmation.

     Place Order:
       1) Creates a real WooCommerce order
       2) Shows a Thank You popup
       3) Optional button sends full order details on WhatsApp (+923332929254)

     Tips:
     • Page template: Elementor Full Width or Canvas
     • In Elementor, select the SECTION → Layout → Content Width: Full Width
       (page template alone is not enough if the section is still Boxed)
     • Hide default Woo checkout if it still shows:

       body.woocommerce-checkout .woocommerce,
       body.woocommerce-checkout .woocommerce-checkout {
         display: none !important;
       }
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
  /* Break out of Elementor/theme boxed containers that leave empty right space */
  .elementor-widget:has(.vc-checkout),
  .elementor-widget-html:has(.vc-checkout),
  .elementor-element:has(> .elementor-widget-container > .vc-checkout),
  .elementor-column:has(.vc-checkout),
  .elementor-top-section:has(.vc-checkout),
  .elementor-section:has(.vc-checkout),
  .e-con:has(.vc-checkout),
  .e-con-inner:has(.vc-checkout) {
    width: 100% !important;
    max-width: 100% !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
  }

  .elementor-section:has(.vc-checkout) > .elementor-container,
  .elementor-top-section:has(.vc-checkout) > .elementor-container {
    width: 100% !important;
    max-width: 100% !important;
  }

  .vc-checkout,
  .vc-checkout * {
    box-sizing: border-box;
  }

  .vc-checkout {
    --font-body: "Source Sans 3", "Segoe UI", sans-serif;
    --font-display: "Cormorant Garamond", Georgia, serif;
    --ink: #121212;
    --ink-2: #3a3a40;
    --muted: #6f6f78;
    --line: rgba(18, 18, 18, 0.12);
    --soft: #f3f1ed;
    --panel: #ffffff;
    --ok: #0f7a4c;
    --warn: #9a3412;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --vc-co-pad: clamp(16px, 3.5vw, 48px);
    position: relative;
    width: 100vw;
    max-width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
    overflow-x: clip;
    padding: clamp(20px, 3vw, 40px) 0 clamp(88px, 10vw, 72px);
    background:
      linear-gradient(180deg, rgba(243, 241, 237, 0.9) 0%, rgba(255, 255, 255, 0.96) 42%, #fff 100%),
      repeating-linear-gradient(
        -12deg,
        transparent,
        transparent 22px,
        rgba(18, 18, 18, 0.015) 22px,
        rgba(18, 18, 18, 0.015) 23px
      );
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  .vc-checkout-inner {
    width: 100%;
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 var(--vc-co-pad);
  }

  .vc-checkout-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 16px 24px;
    align-items: end;
    margin-bottom: clamp(20px, 3vw, 28px);
    padding-bottom: clamp(16px, 2.4vw, 22px);
    border-bottom: 1px solid var(--line);
  }

  .vc-checkout-brand {
    margin: 0 0 8px;
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .vc-checkout-title {
    margin: 0;
    color: var(--ink-2);
    font-family: var(--font-body);
    font-size: clamp(15px, 1.6vw, 17px);
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .vc-checkout-sub {
    margin: 8px 0 0;
    max-width: 46ch;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.55;
  }

  .vc-checkout-total-chip {
    display: grid;
    gap: 4px;
    justify-items: end;
    text-align: right;
    min-width: 0;
  }

  .vc-checkout-total-chip span {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .vc-checkout-total-chip b {
    font-family: var(--font-body);
    font-size: clamp(22px, 3vw, 28px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    word-break: break-word;
  }

  .vc-checkout-shell {
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(300px, 0.85fr);
    gap: clamp(18px, 2.5vw, 32px);
    align-items: start;
    width: 100%;
  }

  .vc-checkout-form,
  .vc-checkout-summary {
    min-width: 0;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--line);
  }

  .vc-checkout-form {
    display: grid;
    gap: 22px;
    padding: clamp(18px, 2.4vw, 28px);
  }

  .vc-checkout-section {
    display: grid;
    gap: 12px;
  }

  .vc-checkout-section h3 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .vc-checkout-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .vc-checkout-field {
    display: grid;
    gap: 6px;
    min-width: 0;
  }

  .vc-checkout-field.is-full {
    grid-column: 1 / -1;
  }

  .vc-checkout-field label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .vc-checkout-field input,
  .vc-checkout-field textarea,
  .vc-checkout-field select {
    width: 100%;
    max-width: 100%;
    min-height: 46px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 0;
    background: #faf9f7;
    color: var(--ink);
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    outline: 0;
    transition: border-color 0.2s var(--ease), background 0.2s var(--ease);
  }

  .vc-checkout-field input:focus,
  .vc-checkout-field textarea:focus,
  .vc-checkout-field select:focus {
    border-color: var(--ink);
    background: #fff;
  }

  .vc-checkout-field textarea {
    min-height: 96px;
    resize: vertical;
  }

  .vc-checkout-payments,
  .vc-checkout-shipping {
    display: grid;
    gap: 10px;
  }

  .vc-checkout-pay,
  .vc-checkout-ship {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    gap: 12px;
    align-items: start;
    padding: 14px;
    border: 1px solid var(--line);
    background: #faf9f7;
    cursor: pointer;
    transition: border-color 0.18s var(--ease), background 0.18s var(--ease);
  }

  .vc-checkout-pay.is-active,
  .vc-checkout-ship.is-active {
    border-color: var(--ink);
    background: #fff;
  }

  .vc-checkout-pay.is-disabled {
    opacity: 0.42;
    cursor: not-allowed;
  }

  .vc-checkout-pay input,
  .vc-checkout-ship input {
    margin-top: 3px;
    accent-color: var(--ink);
  }

  .vc-checkout-pay b,
  .vc-checkout-ship b {
    display: block;
    margin-bottom: 3px;
    font-size: 14px;
    font-weight: 800;
  }

  .vc-checkout-pay span,
  .vc-checkout-ship span {
    display: block;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    line-height: 1.5;
  }

  .vc-checkout-bank {
    display: none;
    margin-top: 4px;
    padding: 14px;
    border: 1px dashed var(--line);
    background: #fff;
    color: var(--ink-2);
    font-size: 13px;
    font-weight: 600;
    line-height: 1.65;
  }

  .vc-checkout-bank.is-visible {
    display: block;
  }

  .vc-checkout-bank strong {
    color: var(--ink);
    font-weight: 800;
  }

  .vc-checkout-receipt {
    display: none;
    margin-top: 4px;
    gap: 8px;
  }

  .vc-checkout-receipt.is-visible {
    display: grid;
  }

  .vc-checkout-receipt label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .vc-checkout-receipt input[type="file"] {
    width: 100%;
    max-width: 100%;
    padding: 12px;
    border: 1px dashed var(--line);
    background: #faf9f7;
    font-size: 13px;
    font-weight: 600;
  }

  .vc-checkout-receipt-name {
    color: var(--ok);
    font-size: 12px;
    font-weight: 700;
    word-break: break-word;
  }

  .vc-checkout-summary {
    position: sticky;
    top: 18px;
    padding: clamp(18px, 2.2vw, 24px);
  }

  .vc-checkout-summary h3 {
    margin: 0 0 16px;
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .vc-order-list {
    display: grid;
    gap: 14px;
    margin-bottom: 14px;
    max-height: min(42vh, 360px);
    overflow: auto;
    padding-right: 4px;
  }

  .vc-order-item {
    display: grid;
    grid-template-columns: 64px minmax(0, 1fr) auto;
    gap: 12px;
    align-items: start;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }

  .vc-order-item:last-child {
    border-bottom: 0;
    padding-bottom: 0;
  }

  .vc-order-img {
    overflow: hidden;
    width: 64px;
    height: 80px;
    background: var(--soft);
  }

  .vc-order-img img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .vc-order-name {
    margin: 0 0 4px;
    font-size: 14px;
    font-weight: 800;
    line-height: 1.3;
  }

  .vc-order-meta {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    line-height: 1.4;
    word-break: break-word;
  }

  .vc-order-price {
    font-size: 14px;
    font-weight: 800;
    white-space: nowrap;
  }

  .vc-checkout-row {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    padding: 8px 0;
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
  }

  .vc-checkout-row span:last-child {
    color: var(--ink);
    text-align: right;
    word-break: break-word;
  }

  .vc-checkout-row.is-discount span:last-child {
    color: var(--ok);
  }

  .vc-checkout-row.total {
    margin-top: 8px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
  }

  .vc-checkout-actions {
    display: grid;
    gap: 10px;
    margin-top: 16px;
  }

  .vc-checkout-submit,
  .vc-checkout-whatsapp,
  .vc-checkout-empty a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 48px;
    padding: 0 16px;
    border: 0;
    border-radius: 0;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-decoration: none;
    transition: transform 0.2s var(--ease), background 0.2s var(--ease), color 0.2s var(--ease);
  }

  .vc-checkout-submit,
  .vc-checkout-empty a {
    background: var(--ink);
    color: #fff;
  }

  .vc-checkout-submit:hover,
  .vc-checkout-empty a:hover {
    background: #2a2a2a;
  }

  .vc-checkout-whatsapp {
    border: 1px solid var(--ink);
    background: #fff;
    color: var(--ink);
  }

  .vc-checkout-whatsapp:hover {
    background: var(--soft);
  }

  .vc-checkout-submit:disabled,
  .vc-checkout-whatsapp:disabled {
    cursor: wait;
    opacity: 0.65;
  }

  .vc-checkout-back {
    display: inline-flex;
    justify-content: center;
    width: 100%;
    margin-top: 4px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
  }

  .vc-checkout-back:hover {
    color: var(--ink);
  }

  .vc-checkout-empty,
  .vc-checkout-loading {
    padding: clamp(36px, 6vw, 56px) clamp(18px, 4vw, 28px);
    border: 1px solid var(--line);
    background: #fff;
    color: var(--muted);
    text-align: center;
  }

  .vc-checkout-empty h3 {
    margin: 0 0 8px;
    color: var(--ink);
    font-family: var(--font-display);
    font-size: clamp(22px, 3vw, 28px);
    font-weight: 600;
  }

  .vc-checkout-empty p {
    margin: 0 auto 18px;
    max-width: 42ch;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.6;
  }

  .vc-checkout-empty a {
    width: auto;
    min-width: min(100%, 220px);
    margin: 0 auto;
  }

  .vc-checkout-free-note {
    margin: 0 0 10px;
    padding: 10px 12px;
    background: #edf8f2;
    color: var(--ok);
    font-size: 12px;
    font-weight: 700;
    line-height: 1.45;
  }

  .vc-checkout-toast {
    position: fixed;
    left: 50%;
    bottom: calc(18px + env(safe-area-inset-bottom, 0px));
    z-index: 100000;
    max-width: min(92vw, 420px);
    padding: 12px 18px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: var(--ink);
    color: #fff;
    box-shadow: 0 18px 40px -28px rgba(0, 0, 0, 0.55);
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    opacity: 0;
    transform: translate(-50%, 16px);
    transition: opacity 0.28s var(--ease), transform 0.28s var(--ease);
    pointer-events: none;
  }

  .vc-checkout-toast.is-showing {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  /* Thank-you confirmation popup */
  .vc-thanks-modal {
    position: fixed;
    inset: 0;
    z-index: 100010;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.28s var(--ease), visibility 0.28s var(--ease);
  }

  .vc-thanks-modal.is-open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  .vc-thanks-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(18, 18, 18, 0.55);
  }

  .vc-thanks-box {
    position: relative;
    z-index: 1;
    width: min(440px, calc(100vw - 32px));
    padding: 36px 28px 28px;
    background: #fff;
    border: 1px solid var(--line);
    box-shadow: 0 28px 70px -28px rgba(0, 0, 0, 0.55);
    text-align: center;
    transform: translateY(14px) scale(0.98);
    transition: transform 0.32s var(--ease);
  }

  .vc-thanks-modal.is-open .vc-thanks-box {
    transform: none;
  }

  .vc-thanks-icon {
    display: inline-grid;
    place-items: center;
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
    border: 2px solid var(--ok);
    color: var(--ok);
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  .vc-thanks-title {
    margin: 0 0 8px;
    font-family: var(--font-display);
    font-size: clamp(24px, 4vw, 30px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .vc-thanks-order {
    margin: 0 0 12px;
    color: var(--ink-2);
    font-size: 14px;
    font-weight: 700;
  }

  .vc-thanks-copy {
    margin: 0 auto 22px;
    max-width: 34ch;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
  }

  .vc-thanks-actions {
    display: grid;
    gap: 10px;
  }

  .vc-thanks-wa,
  .vc-thanks-shop {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 48px;
    padding: 0 16px;
    border: 0;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-decoration: none;
  }

  .vc-thanks-wa {
    background: #128c7e;
    color: #fff;
  }

  .vc-thanks-wa:hover {
    background: #0e7a6e;
  }

  .vc-thanks-shop {
    border: 1px solid var(--ink);
    background: #fff;
    color: var(--ink);
  }

  .vc-thanks-shop:hover {
    background: var(--soft);
  }

  .vc-checkout-mobile-bar {
    display: none;
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 99990;
    gap: 12px;
    align-items: center;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(10px);
  }

  .vc-checkout-mobile-bar-copy {
    min-width: 0;
    flex: 1 1 auto;
  }

  .vc-checkout-mobile-bar-copy span {
    display: block;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .vc-checkout-mobile-bar-copy b {
    display: block;
    margin-top: 2px;
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    word-break: break-word;
  }

  .vc-checkout-mobile-bar .vc-checkout-submit {
    width: auto;
    min-width: 148px;
    flex: 0 0 auto;
    margin: 0;
  }

  @media (max-width: 960px) {
    .vc-checkout-shell {
      display: flex;
      flex-direction: column;
      grid-template-columns: none;
    }

    .vc-checkout-form {
      order: 1;
    }

    .vc-checkout-summary {
      position: static;
      order: 2; /* Delivery first, order summary at the end on mobile */
    }

    .vc-order-list {
      max-height: none;
    }

    .vc-checkout-actions .vc-checkout-submit {
      display: none;
    }

    .vc-checkout-mobile-bar {
      display: flex;
    }

    .vc-checkout-toast {
      bottom: calc(84px + env(safe-area-inset-bottom, 0px));
    }
  }

  @media (max-width: 640px) {
    .vc-checkout {
      padding-top: 16px;
    }

    .vc-checkout-head {
      grid-template-columns: 1fr;
      align-items: start;
    }

    .vc-checkout-total-chip {
      justify-items: start;
      text-align: left;
    }

    .vc-checkout-grid {
      grid-template-columns: 1fr;
    }

    .vc-order-item {
      grid-template-columns: 56px minmax(0, 1fr);
    }

    .vc-order-img {
      width: 56px;
      height: 70px;
    }

    .vc-order-price {
      grid-column: 2;
      justify-self: start;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .vc-checkout-submit,
    .vc-checkout-whatsapp,
    .vc-checkout-toast,
    .vc-thanks-modal,
    .vc-thanks-box,
    .vc-checkout-field input,
    .vc-checkout-pay,
    .vc-checkout-ship {
      transition: none !important;
    }
  }
</style>

<section class="vc-checkout" id="vcCheckoutSection">
  <div class="vc-checkout-inner">
    <header class="vc-checkout-head">
      <div>
        <p class="vc-checkout-brand">Vibecano</p>
        <h1 class="vc-checkout-title">Checkout</h1>
        <p class="vc-checkout-sub">Enter delivery details, choose shipping and payment, then place your order.</p>
      </div>
      <div class="vc-checkout-total-chip">
        <span>Order total</span>
        <b id="vcCheckoutTotal">—</b>
      </div>
    </header>

    <div id="vcCheckoutRoot">
      <div class="vc-checkout-loading">Loading checkout...</div>
    </div>
  </div>
</section>

<div class="vc-checkout-mobile-bar" id="vcCheckoutMobileBar" hidden>
  <div class="vc-checkout-mobile-bar-copy">
    <span>Total</span>
    <b id="vcMobileTotal">—</b>
  </div>
  <button class="vc-checkout-submit" type="button" id="vcMobilePlaceOrder">Place Order</button>
</div>

<div id="vcCheckoutToast" class="vc-checkout-toast" aria-live="polite"></div>

<div class="vc-thanks-modal" id="vcThanksModal" role="dialog" aria-modal="true" aria-labelledby="vcThanksTitle" aria-hidden="true">
  <div class="vc-thanks-backdrop" data-thanks-close tabindex="-1"></div>
  <div class="vc-thanks-box">
    <div class="vc-thanks-icon" aria-hidden="true">✓</div>
    <h2 class="vc-thanks-title" id="vcThanksTitle">Thank you</h2>
    <p class="vc-thanks-order" id="vcThanksOrder">Your order is confirmed.</p>
    <p class="vc-thanks-copy">
      Your order has been placed successfully. For a quicker response, send your order details on WhatsApp.
    </p>
    <div class="vc-thanks-actions">
      <button class="vc-thanks-wa" type="button" id="vcThanksWhatsApp">Send WhatsApp message</button>
      <a class="vc-thanks-shop" id="vcThanksShop" href="/shop/">Continue shopping</a>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var API = "/wp-json/wc/store/v1";
  var CART = "/cart/";
  var SHOP = "/shop/";
  var WHATSAPP = "923332929254";
  var CART_TOKEN_KEY = "vcWcCartToken";
  var SHIPPING_NORMAL = 300;
  var SHIPPING_URGENT = 500;
  var FREE_SHIPPING_MIN = 5000;
  var CUSTOM_PRODUCT_IDS = [111, 221];

  var root = document.getElementById("vcCheckoutRoot");
  var toastEl = document.getElementById("vcCheckoutToast");
  var totalEl = document.getElementById("vcCheckoutTotal");
  var mobileBarEl = document.getElementById("vcCheckoutMobileBar");
  var mobileTotalEl = document.getElementById("vcMobileTotal");
  var mobilePlaceEl = document.getElementById("vcMobilePlaceOrder");
  var sectionEl = document.getElementById("vcCheckoutSection");
  var thanksModalEl = document.getElementById("vcThanksModal");
  var thanksOrderEl = document.getElementById("vcThanksOrder");
  var thanksWhatsAppBtn = document.getElementById("vcThanksWhatsApp");
  var thanksShopLink = document.getElementById("vcThanksShop");
  var nonce = "";
  var cart = null;
  var receipt = null;
  var pendingWhatsAppMessage = "";

  if (!root || !toastEl || !window.fetch) {
    return;
  }

  if (thanksShopLink) thanksShopLink.setAttribute("href", SHOP);

  if (thanksWhatsAppBtn) {
    thanksWhatsAppBtn.addEventListener("click", sendPendingWhatsApp);
  }
  if (thanksModalEl) {
    thanksModalEl.addEventListener("click", function (event) {
      if (event.target && event.target.closest("[data-thanks-close]")) hideThanksPopup();
    });
  }
  document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") hideThanksPopup();
  });

  // Elementor "Full Width" page template can still wrap HTML in a boxed
  // section/column — force ancestors to full width so content is not left-stuck.
  function forceFullWidthParents() {
    if (!sectionEl) return;
    var node = sectionEl.parentElement;
    var hops = 0;
    while (node && hops < 12 && node !== document.body) {
      var className = String(node.className || "");
      var isLayoutNode =
        /elementor|e-con|site-main|site-content|content-area|ast-container|entry-content|page-content|woocommerce/i.test(className) ||
        node.id === "content" ||
        node.id === "primary" ||
        node.id === "main";
      if (isLayoutNode) {
        node.style.setProperty("width", "100%", "important");
        node.style.setProperty("max-width", "100%", "important");
        node.style.setProperty("margin-left", "0", "important");
        node.style.setProperty("margin-right", "0", "important");
        if (/elementor-container|e-con-inner/i.test(className)) {
          node.style.setProperty("padding-left", "0", "important");
          node.style.setProperty("padding-right", "0", "important");
        }
      }
      node = node.parentElement;
      hops += 1;
    }
  }

  forceFullWidthParents();
  window.addEventListener("resize", forceFullWidthParents);

  function $(selector, context) {
    return (context || document).querySelector(selector);
  }

  function $all(selector, context) {
    return Array.prototype.slice.call((context || document).querySelectorAll(selector));
  }

  function bootstrapCartTokenFromUrl() {
    try {
      var params = new URLSearchParams(window.location.search);
      var session = params.get("session");
      if (session) sessionStorage.setItem(CART_TOKEN_KEY, session);
    } catch (error) {}
  }

  bootstrapCartTokenFromUrl();

  function getStoredCartToken() {
    try {
      return sessionStorage.getItem(CART_TOKEN_KEY) || "";
    } catch (error) {
      return "";
    }
  }

  function storeCartToken(response) {
    var token = response.headers.get("Cart-Token");
    if (!token) return getStoredCartToken();
    try {
      sessionStorage.setItem(CART_TOKEN_KEY, token);
    } catch (error) {}
    return token;
  }

  function getCartHeaders() {
    var headers = {
      "Content-Type": "application/json",
      "Nonce": nonce,
      "X-WC-Store-API-Nonce": nonce
    };
    var token = getStoredCartToken();
    if (token) headers["Cart-Token"] = token;
    return headers;
  }

  function selectedPayment() {
    var checked = $('input[name="vcPay"]:checked');
    return checked ? checked.value : "cod";
  }

  function selectedShipping() {
    var checked = $('input[name="vcShip"]:checked');
    return checked ? checked.value : "normal";
  }

  function paymentName(method) {
    method = method || selectedPayment();
    if (method === "cod") return "Cash on Delivery";
    if (method === "easypaisa") return "EasyPaisa";
    if (method === "jazzcash") return "JazzCash";
    if (method === "bank") return "Bank Transfer";
    if (method === "bacs") return "Bank Transfer / JazzCash / EasyPaisa";
    if (method === "cheque") return "Cheque";
    return method;
  }

  function wcPaymentMethod(method) {
    if (method === "cod") return "cod";
    if (method === "bank" || method === "cheque") return method === "cheque" ? "cheque" : "bacs";
    if (method === "easypaisa" || method === "jazzcash") return "bacs";
    return method;
  }

  function showToast(message) {
    toastEl.textContent = message;
    toastEl.classList.add("is-showing");
    setTimeout(function () {
      toastEl.classList.remove("is-showing");
    }, 2300);
  }

  function setMobileBarVisible(visible) {
    if (!mobileBarEl) return;
    if (visible) {
      mobileBarEl.hidden = false;
      mobileBarEl.style.display = "";
    } else {
      mobileBarEl.hidden = true;
      mobileBarEl.style.display = "none";
    }
  }

  function fetchCart() {
    var headers = {};
    var token = getStoredCartToken();
    if (token) headers["Cart-Token"] = token;

    return fetch(API + "/cart", { credentials: "include", headers: headers }).then(function (response) {
      nonce = response.headers.get("Nonce") || response.headers.get("X-WC-Store-API-Nonce") || nonce;
      storeCartToken(response);
      if (!response.ok) throw new Error("Cart request failed");
      return response.json();
    });
  }

  function updateCustomer(payload) {
    return fetch(API + "/cart/update-customer", {
      method: "POST",
      credentials: "include",
      headers: getCartHeaders(),
      body: JSON.stringify(payload)
    }).then(function (response) {
      nonce = response.headers.get("Nonce") || response.headers.get("X-WC-Store-API-Nonce") || nonce;
      storeCartToken(response);
      return response.json().then(function (data) {
        if (!response.ok) {
          throw new Error(stripApiError(data) || "Could not update customer details");
        }
        return data;
      });
    });
  }

  function selectShippingRate(packageId, rateId) {
    return fetch(API + "/cart/select-shipping-rate", {
      method: "POST",
      credentials: "include",
      headers: getCartHeaders(),
      body: JSON.stringify({
        package_id: packageId,
        rate_id: rateId
      })
    }).then(function (response) {
      nonce = response.headers.get("Nonce") || response.headers.get("X-WC-Store-API-Nonce") || nonce;
      storeCartToken(response);
      return response.json().then(function (data) {
        if (!response.ok) {
          throw new Error(stripApiError(data) || "Could not select shipping method");
        }
        return data;
      });
    });
  }

  function checkoutOrder(payload) {
    return fetch(API + "/checkout", {
      method: "POST",
      credentials: "include",
      headers: getCartHeaders(),
      body: JSON.stringify(payload)
    }).then(function (response) {
      nonce = response.headers.get("Nonce") || response.headers.get("X-WC-Store-API-Nonce") || nonce;
      storeCartToken(response);
      return response.json().then(function (data) {
        if (!response.ok) {
          throw new Error(stripApiError(data) || "Checkout failed");
        }
        return data;
      });
    });
  }

  function stripApiError(data) {
    if (!data) return "";
    var message = String(data.message || data.code || "");
    return message.replace(/<[^>]+>/g, "").trim();
  }

  function normalizeProvince(value) {
    var raw = String(value || "").trim();
    if (!raw) return "PB";
    var key = raw.toLowerCase().replace(/\s+/g, " ");
    var map = {
      pb: "PB",
      punjab: "PB",
      sd: "SD",
      sindh: "SD",
      kp: "KP",
      kpk: "KP",
      "khyber pakhtunkhwa": "KP",
      "khyber pakhtoonkhwa": "KP",
      balochistan: "BA",
      ba: "BA",
      is: "IS",
      islamabad: "IS",
      "azad kashmir": "AJK",
      ajk: "AJK",
      gilgit: "GB",
      "gilgit baltistan": "GB",
      gb: "GB"
    };
    return map[key] || raw;
  }

  function resolveShippingChoice(cartData) {
    var packages = cartData && Array.isArray(cartData.shipping_rates) ? cartData.shipping_rates : [];
    var pkg = packages[0];
    if (!pkg) return null;
    var rates = Array.isArray(pkg.shipping_rates) ? pkg.shipping_rates : [];
    if (!rates.length) return null;

    var wantUrgent = selectedShipping() === "urgent";
    var match = null;
    var i;

    for (i = 0; i < rates.length; i += 1) {
      var rate = rates[i];
      var name = String((rate && rate.name) || "").toLowerCase();
      var id = String((rate && rate.rate_id) || "");
      if (wantUrgent && (/urgent|express|priority|same.?day/.test(name) || /:2$/.test(id))) {
        match = rate;
        break;
      }
      if (!wantUrgent && (/normal|standard|flat|regular/.test(name) || /:1$/.test(id))) {
        match = rate;
        break;
      }
    }

    if (!match) {
      match = rates.filter(function (rate) { return rate && rate.selected; })[0] || rates[0];
    }

    return {
      package_id: pkg.package_id !== undefined ? pkg.package_id : 0,
      rate_id: match.rate_id
    };
  }

  function resolvePaymentMethod(preferred, cartData) {
    var available = (cartData && Array.isArray(cartData.payment_methods) ? cartData.payment_methods : [])
      .map(function (method) { return String(method || ""); })
      .filter(Boolean);
    var mapped = wcPaymentMethod(preferred);

    if (!available.length) return mapped;
    if (available.indexOf(mapped) >= 0) return mapped;

    // Prefer COD, then bank transfer, then cheque, then first available
    var fallbacks = ["cod", "bacs", "cheque"];
    var i;
    for (i = 0; i < fallbacks.length; i += 1) {
      if (available.indexOf(fallbacks[i]) >= 0) return fallbacks[i];
    }
    return available[0];
  }

  function paymentMethodsToTry(preferred, cartData) {
    var primary = resolvePaymentMethod(preferred, cartData);
    var available = (cartData && Array.isArray(cartData.payment_methods) ? cartData.payment_methods : []).slice();
    var list = [primary];
    ["cod", "bacs", "cheque"].forEach(function (method) {
      if (list.indexOf(method) === -1 && (!available.length || available.indexOf(method) >= 0)) {
        list.push(method);
      }
    });
    available.forEach(function (method) {
      if (list.indexOf(method) === -1) list.push(method);
    });
    return list;
  }

  function hasCustomItems(items) {
    items = items || (cart && cart.items) || [];
    return items.some(function (item) {
      if (CUSTOM_PRODUCT_IDS.indexOf(Number(item.id)) >= 0) return true;
      if (item.item_data && item.item_data.length) return true;
      return false;
    });
  }

  function checkoutTotals(cartData) {
    var totals = cartData && cartData.totals ? cartData.totals : {};
    var minor = Number.isFinite(Number(totals.currency_minor_unit)) ? Number(totals.currency_minor_unit) : 0;
    var prefix = totals.currency_prefix || totals.currency_symbol || "Rs ";
    var subtotalRaw = Number(totals.total_items || 0);
    var discountRaw = Number(totals.total_discount || 0);
    var subtotal = subtotalRaw / Math.pow(10, minor);
    var discount = discountRaw / Math.pow(10, minor);
    var apiShipping = Number(totals.total_shipping || 0) / Math.pow(10, minor);
    var baseShipping = selectedShipping() === "urgent" ? SHIPPING_URGENT : SHIPPING_NORMAL;
    var shipping = apiShipping > 0 ? apiShipping : baseShipping;
    var shippingNote = selectedShipping() === "urgent" ? "Urgent delivery" : "Normal delivery";

    if (subtotal - discount >= FREE_SHIPPING_MIN) {
      shipping = 0;
      shippingNote = "Free shipping over Rs. 5,000";
    } else if (!hasCustomItems(cartData && cartData.items) && selectedPayment() !== "cod") {
      shipping = Math.round(shipping / 2);
      shippingNote += " — 50% advance payment discount";
    }

    var total = subtotal - discount + shipping + Number(totals.total_tax || 0) / Math.pow(10, minor);
    return {
      minor: minor,
      prefix: prefix,
      subtotalRaw: subtotalRaw,
      subtotal: subtotal,
      discount: discount,
      discountRaw: discountRaw,
      shipping: shipping,
      shippingNote: shippingNote,
      tax: Number(totals.total_tax || 0) / Math.pow(10, minor),
      total: total,
      freeShipping: subtotal - discount >= FREE_SHIPPING_MIN
    };
  }

  function normalizeMetaLabel(raw) {
    var label = String(raw || "")
      .replace(/^attribute_/i, "")
      .replace(/^pa_/i, "")
      .replace(/[-_]/g, " ")
      .trim();

    if (/^size$/i.test(label)) return "Size";
    if (/^colou?r$/i.test(label)) return "Color";
    if (!label) return "Detail";

    return label.split(/\s+/).map(function (word) {
      return word.charAt(0).toUpperCase() + word.slice(1);
    }).join(" ");
  }

  function getItemMetaLines(item) {
    var lines = [];
    var seen = {};

    function pushLine(label, value) {
      var cleanLabel = normalizeMetaLabel(label);
      var cleanValue = String(value || "").trim();
      if (!cleanValue) return;
      var key = cleanLabel.toLowerCase() + "::" + cleanValue.toLowerCase();
      if (seen[key]) return;
      seen[key] = true;
      lines.push({ label: cleanLabel, value: cleanValue });
    }

    if (item && Array.isArray(item.variation)) {
      item.variation.forEach(function (entry) {
        pushLine(entry && entry.attribute, entry && entry.value);
      });
    }

    if (item && Array.isArray(item.item_data)) {
      item.item_data.forEach(function (entry) {
        pushLine(
          (entry && (entry.name || entry.key || entry.attribute)) || "",
          (entry && (entry.display || entry.value)) || ""
        );
      });
    }

    if (item && Array.isArray(item.attributes)) {
      item.attributes.forEach(function (entry) {
        pushLine(entry && entry.name, entry && entry.value);
      });
    }

    if (item && typeof item.variation === "string" && item.variation.trim()) {
      item.variation.split(/,\s*/).forEach(function (part) {
        var pieces = String(part || "").split(/\s*:\s*/);
        if (pieces.length >= 2) pushLine(pieces[0], pieces.slice(1).join(": "));
      });
    }

    if (!lines.length) {
      var name = String((item && item.name) || "");
      var dashIndex = name.indexOf(" - ");
      if (dashIndex >= 0) {
        name.slice(dashIndex + 3).split(/,\s*/).forEach(function (part) {
          part = String(part || "").trim();
          if (!part) return;
          if (/^(xs|s|m|l|xl|xxl|small|medium|large)$/i.test(part)) pushLine("Size", part);
          else if (/^size\b/i.test(part)) pushLine("Size", part.replace(/^size\s*:?\s*/i, ""));
          else if (/^colou?r\b/i.test(part)) pushLine("Color", part.replace(/^colou?r\s*:?\s*/i, ""));
          else pushLine("Option", part);
        });
      }
    }

    return lines;
  }

  function formatItemMetaInline(item) {
    var parts = ["Qty: " + Number(item.quantity || 1)];
    getItemMetaLines(item).forEach(function (line) {
      parts.push(line.label + ": " + line.value);
    });
    return parts.join(" · ");
  }

  function formatItemMetaForNote(item) {
    var meta = getItemMetaLines(item).map(function (line) {
      return line.label + ": " + line.value;
    }).join(", ");
    return (item.name || "Product") + " x" + Number(item.quantity || 1) + (meta ? " (" + meta + ")" : "");
  }

  function buildCustomerNote(formData, payLabel, receiptName) {
    var computed = checkoutTotals(cart);
    var lines = [
      "Vibecano custom checkout",
      "Payment: " + payLabel,
      "Shipping: " + (selectedShipping() === "urgent" ? "Urgent delivery" : "Normal delivery")
    ];

    if (receiptName) lines.push("Receipt file: " + receiptName);
    if (formData.note) lines.push("Customer note: " + formData.note);

    lines.push("Items:");
    (cart.items || []).forEach(function (item) {
      lines.push("- " + formatItemMetaForNote(item));
    });

    lines.push(
      "Subtotal: " + formatMoney(computed.subtotalRaw, computed.minor, computed.prefix),
      "Shipping: " + (computed.shipping > 0
        ? formatMoney(Math.round(computed.shipping * Math.pow(10, computed.minor)), computed.minor, computed.prefix)
        : "Free"),
      "Total: " + formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix)
    );

    return lines.join("\n");
  }

  function buildWhatsAppMessage(order, formData, payLabel) {
    var computed = checkoutTotals(cart);
    var lines = [
      "*NEW ORDER — Vibecano*",
      "",
      "*Customer:* " + formData.firstName + " " + formData.lastName,
      "*Phone:* " + formData.phone,
      formData.email ? "*Email:* " + formData.email : "",
      "*Address:* " + formData.address + ", " + formData.city,
      "",
      "*Items:*"
    ].filter(Boolean);

    (cart.items || []).forEach(function (item) {
      lines.push(
        "• " + (item.name || "Product") +
        " ×" + Number(item.quantity || 1) +
        " — " + formatMoney(item.totals && item.totals.line_total, computed.minor, computed.prefix)
      );
      getItemMetaLines(item).forEach(function (meta) {
        lines.push("  - " + meta.label + ": " + meta.value);
      });
    });

    lines.push("");
    lines.push("*Subtotal:* " + formatMoney(computed.subtotalRaw, computed.minor, computed.prefix));
    lines.push("*Delivery:* " + (selectedShipping() === "urgent" ? "Urgent Delivery" : "Normal Delivery"));
    lines.push("*Shipping:* " + (computed.shipping > 0
      ? formatMoney(Math.round(computed.shipping * Math.pow(10, computed.minor)), computed.minor, computed.prefix)
      : computed.shippingNote));
    lines.push("*TOTAL:* " + formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix));
    lines.push("");
    lines.push("*Payment:* " + payLabel);

    if (selectedPayment() !== "cod") {
      lines.push("_Advance payment receipt is required before order confirmation._");
      if (receipt && receipt.name) lines.push("*Receipt file:* " + receipt.name);
    }

    if (hasCustomItems()) {
      lines.push("_Customizable products are confirmed only after full payment receipt verification._");
    }

    if (formData.note) {
      lines.push("");
      lines.push("*Special Instructions:*");
      lines.push(formData.note);
    }

    if (order && (order.order_id || order.id)) {
      lines.unshift("Order #" + (order.order_id || order.id));
    }

    return lines.join("\n");
  }

  function buildWhatsAppUrl(message) {
    return "https://wa.me/" + WHATSAPP + "?text=" + encodeURIComponent(message);
  }

  function openWhatsAppWithReceipt(message, preOpenedWindow) {
    var waUrl = buildWhatsAppUrl(message);
    var target = preOpenedWindow || null;

    function navigateToWhatsApp() {
      if (target && !target.closed) {
        try {
          target.location.href = waUrl;
          return true;
        } catch (error) {
          try { target.close(); } catch (e) {}
        }
      }

      var opened = window.open(waUrl, "_blank");
      if (opened) return true;

      // Last resort: same-tab redirect (never blocked)
      window.location.href = waUrl;
      return false;
    }

    if (receipt && receipt.file && navigator.share) {
      try {
        var sharePayload = { text: message, files: [receipt.file] };
        if (!navigator.canShare || navigator.canShare(sharePayload)) {
          navigator.share(sharePayload).then(function () {
            if (target && !target.closed) {
              try { target.close(); } catch (e) {}
            }
            showToast("Order sent — receipt shared");
          }).catch(function () {
            navigateToWhatsApp();
            showToast("Attach your payment receipt in WhatsApp");
          });
          return;
        }
      } catch (error) {}
    }

    navigateToWhatsApp();
    if (receipt && receipt.name) showToast("Attach your payment receipt in WhatsApp");

    if (
      receipt &&
      receipt.type &&
      receipt.type.indexOf("image/") === 0 &&
      receipt.dataUrl &&
      (!navigator.share || !navigator.canShare)
    ) {
      setTimeout(function () {
        var receiptWindow = window.open("", "_blank");
        if (!receiptWindow) return;
        receiptWindow.document.write(
          "<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>Attach payment receipt</title></head>" +
          "<body style=\"font-family:'Source Sans 3',sans-serif;padding:24px;max-width:720px;margin:0 auto;text-align:center;color:#121212\">" +
          "<h2 style=\"margin:0 0 10px\">Payment receipt</h2>" +
          "<p style=\"color:#6f6f78;line-height:1.6\">WhatsApp links cannot attach files automatically. Long-press or save this image, then attach it in your WhatsApp chat.</p>" +
          "<img src=\"" + receipt.dataUrl + "\" alt=\"Payment receipt\" style=\"max-width:100%;height:auto;border:1px solid #ddd;margin:18px 0\">" +
          "<p style=\"font-size:13px;color:#6f6f78\">File: " + escapeHtml(receipt.name || "receipt") + "</p>" +
          "</body></html>"
        );
        receiptWindow.document.close();
      }, 400);
    }
  }

  function readFormData() {
    return {
      firstName: String(($("#vcFn") && $("#vcFn").value) || "").trim(),
      lastName: String(($("#vcLn") && $("#vcLn").value) || "").trim(),
      phone: String(($("#vcPhone") && $("#vcPhone").value) || "").trim(),
      email: String(($("#vcEmail") && $("#vcEmail").value) || "").trim(),
      address: String(($("#vcAddress") && $("#vcAddress").value) || "").trim(),
      city: String(($("#vcCity") && $("#vcCity").value) || "").trim(),
      note: String(($("#vcNote") && $("#vcNote").value) || "").trim()
    };
  }

  function validateForm(formData) {
    if (!formData.firstName) {
      return { message: "Please enter your first name.", focusId: "vcFn" };
    }
    if (!formData.lastName) {
      return { message: "Please enter your last name.", focusId: "vcLn" };
    }
    if (!formData.phone) {
      return { message: "Please enter your WhatsApp / phone number.", focusId: "vcPhone" };
    }
    if (!formData.address) {
      return { message: "Please enter your complete delivery address.", focusId: "vcAddress" };
    }
    if (!formData.city) {
      return { message: "Please enter your city.", focusId: "vcCity" };
    }
    if (selectedPayment() !== "cod" && !receipt) {
      var pay = selectedPayment();
      var focusId = pay === "jazzcash" ? "vcReceiptJc" : pay === "bank" ? "vcReceiptBank" : "vcReceiptEp";
      return {
        message: "Please upload your payment receipt before placing the order.",
        focusId: focusId
      };
    }
    return null;
  }

  function alertMissingField(result) {
    if (!result) return;
    window.alert(result.message);
    showToast(result.message);
    var field = result.focusId ? $("#" + result.focusId) : null;
    if (field && typeof field.focus === "function") {
      try {
        field.scrollIntoView({ behavior: "smooth", block: "center" });
      } catch (error) {}
      try { field.focus(); } catch (error) {}
    }
  }

  function resetPlaceOrderButtons() {
    var submitButton = $("#vcPlaceOrder");
    if (submitButton) {
      submitButton.disabled = false;
      submitButton.textContent = "Place Order";
    }
    if (mobilePlaceEl) {
      mobilePlaceEl.disabled = false;
      mobilePlaceEl.textContent = "Place Order";
    }
  }

  function ensureBillingEmail(formData) {
    if (formData.email) return formData.email;
    var digits = String(formData.phone || "").replace(/\D+/g, "") || "guest";
    return "order+" + digits + "@vibecano.com";
  }

  function writeWaPlaceholder(win) {
    if (!win || win.closed) return;
    try {
      win.document.write(
        "<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>Opening WhatsApp…</title></head>" +
        "<body style=\"font-family:'Source Sans 3',Segoe UI,sans-serif;display:grid;place-items:center;min-height:100vh;margin:0;background:#f7f5f2;color:#121212;text-align:center;padding:24px\">" +
        "<div><h2 style=\"margin:0 0 8px\">Preparing your order…</h2>" +
        "<p style=\"margin:0;color:#6f6f78;font-weight:600\">WhatsApp will open with your order details.</p></div></body></html>"
      );
      win.document.close();
    } catch (error) {}
  }

  function placeOrder() {
    resetPlaceOrderButtons();

    var formData = readFormData();
    var validationError = validateForm(formData);
    if (validationError) {
      alertMissingField(validationError);
      return;
    }

    var submitButton = $("#vcPlaceOrder");
    var buttons = [submitButton, mobilePlaceEl].filter(Boolean);

    buttons.forEach(function (btn) {
      btn.disabled = true;
      btn.textContent = "Placing order...";
    });

    var payMethod = selectedPayment();
    var payLabel = paymentName(payMethod);
    var receiptName = receipt && receipt.name ? receipt.name : "";
    var customerNote = buildCustomerNote(formData, payLabel, receiptName);
    var billingEmail = ensureBillingEmail(formData);
    var provinceCode = "PB";
    var postcode = "00000";

    var addressPayload = {
      billing_address: {
        first_name: formData.firstName,
        last_name: formData.lastName,
        company: "",
        address_1: formData.address,
        address_2: "",
        city: formData.city,
        state: provinceCode,
        postcode: postcode,
        country: "PK",
        email: billingEmail,
        phone: formData.phone
      },
      shipping_address: {
        first_name: formData.firstName,
        last_name: formData.lastName,
        company: "",
        address_1: formData.address,
        address_2: "",
        city: formData.city,
        state: provinceCode,
        postcode: postcode,
        country: "PK",
        phone: formData.phone
      }
    };

    function attemptCheckout(methods, index, lastError) {
      if (index >= methods.length) {
        return Promise.reject(lastError || new Error("Could not create WooCommerce order"));
      }
      var method = methods[index];
      var note = customerNote;
      if (method !== wcPaymentMethod(payMethod)) {
        note += "\nPreferred payment UI: " + payLabel;
      }
      return checkoutOrder({
        billing_address: addressPayload.billing_address,
        shipping_address: addressPayload.shipping_address,
        payment_method: method,
        payment_data: [],
        customer_note: note,
        create_account: false
      }).catch(function (error) {
        return attemptCheckout(methods, index + 1, error);
      });
    }

    // Create WooCommerce order, then show thank-you popup (WhatsApp is optional)
    updateCustomer(addressPayload)
      .then(function (updatedCart) {
        cart = updatedCart || cart;
        var shippingChoice = resolveShippingChoice(cart);
        if (!shippingChoice || !shippingChoice.rate_id) return cart;
        return selectShippingRate(shippingChoice.package_id, shippingChoice.rate_id).then(function (nextCart) {
          cart = nextCart || cart;
          return cart;
        }).catch(function () {
          return cart;
        });
      })
      .then(function (readyCart) {
        cart = readyCart || cart;
        var methods = paymentMethodsToTry(payMethod, cart);
        return attemptCheckout(methods, 0, null);
      })
      .then(function (order) {
        if (!order || !(order.order_id || order.id || order.order_number)) {
          throw new Error("WooCommerce did not return an order ID");
        }
        pendingWhatsAppMessage = buildWhatsAppMessage(order, formData, payLabel);
        showThanksPopup(order);
        showToast("Order confirmed");
      })
      .catch(function (error) {
        var message = (error && error.message) ? String(error.message) : "Could not create WooCommerce order";
        window.alert("Order could not be placed: " + message);
        showToast(message);
        resetPlaceOrderButtons();
      })
      .finally(function () {
        resetPlaceOrderButtons();
      });
  }

  function showThanksPopup(order) {
    var orderId = order && (order.order_id || order.id || order.order_number)
      ? String(order.order_id || order.id || order.order_number)
      : "";

    setMobileBarVisible(false);
    renderSuccess(order);

    if (thanksOrderEl) {
      thanksOrderEl.textContent = orderId
        ? ("Order #" + orderId + " is confirmed.")
        : "Your order is confirmed.";
    }
    if (thanksModalEl) {
      thanksModalEl.classList.add("is-open");
      thanksModalEl.setAttribute("aria-hidden", "false");
      document.documentElement.style.overflow = "hidden";
    }
  }

  function hideThanksPopup() {
    if (!thanksModalEl || !thanksModalEl.classList.contains("is-open")) return;
    thanksModalEl.classList.remove("is-open");
    thanksModalEl.setAttribute("aria-hidden", "true");
    document.documentElement.style.overflow = "";
  }

  function sendPendingWhatsApp() {
    if (!pendingWhatsAppMessage) {
      window.alert("Order message is not ready yet. Please place the order again.");
      return;
    }
    openWhatsAppWithReceipt(pendingWhatsAppMessage, null);
    showToast("Opening WhatsApp…");
  }

  function enforcePaymentRules() {
    var custom = hasCustomItems();
    $all('input[name="vcPay"]').forEach(function (radio) {
      var label = radio.closest(".vc-checkout-pay");
      if (radio.value === "cod") {
        radio.disabled = custom;
        if (label) label.classList.toggle("is-disabled", custom);
      }
      if (label) label.classList.toggle("is-active", radio.checked);
    });

    if (custom && selectedPayment() === "cod") {
      var fallback = $('input[name="vcPay"][value="easypaisa"]') || $('input[name="vcPay"]:not([value="cod"])');
      if (fallback) fallback.checked = true;
    }

    var pay = selectedPayment();
    var bankDetails = $("#vcCoBankDetails");
    if (bankDetails) bankDetails.classList.toggle("is-visible", pay !== "cod");

    $all(".vc-checkout-receipt").forEach(function (node) {
      node.classList.remove("is-visible");
    });

    if (pay === "easypaisa" && $("#vcReceiptEpWrap")) $("#vcReceiptEpWrap").classList.add("is-visible");
    if (pay === "jazzcash" && $("#vcReceiptJcWrap")) $("#vcReceiptJcWrap").classList.add("is-visible");
    if (pay === "bank" && $("#vcReceiptBankWrap")) $("#vcReceiptBankWrap").classList.add("is-visible");

    updateSummaryTotals();
  }

  function updateSummaryTotals() {
    if (!cart) return;
    var computed = checkoutTotals(cart);
    var shippingEl = $("#vcCoShippingAmount");
    var totalElSummary = $("#vcCoTotalAmount");
    var freeNote = $("#vcCoFreeShippingNote");
    var formatted = formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix);

    if (shippingEl) {
      shippingEl.textContent = computed.shipping > 0
        ? formatMoney(Math.round(computed.shipping * Math.pow(10, computed.minor)), computed.minor, computed.prefix)
        : "Free";
    }
    if (totalElSummary) totalElSummary.textContent = formatted;
    if (totalEl) totalEl.textContent = formatted;
    if (mobileTotalEl) mobileTotalEl.textContent = formatted;
    if (freeNote) freeNote.hidden = !computed.freeShipping;
  }

  function setupPayments() {
    $all('input[name="vcPay"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        receipt = null;
        $all(".vc-checkout-receipt-name").forEach(function (node) {
          node.textContent = "";
        });
        ["vcReceiptEp", "vcReceiptJc", "vcReceiptBank"].forEach(function (id) {
          var input = $("#" + id);
          if (input) input.value = "";
        });
        enforcePaymentRules();
      });
    });

    $all('input[name="vcShip"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        $all(".vc-checkout-ship").forEach(function (node) {
          var input = node.querySelector("input");
          node.classList.toggle("is-active", !!(input && input.checked));
        });
        updateSummaryTotals();
      });
    });

    function bindReceiptInput(inputId, nameElId) {
      var input = $("#" + inputId);
      var nameEl = $("#" + nameElId);
      if (!input) return;
      input.addEventListener("change", function (event) {
        var file = event.target.files && event.target.files[0];
        if (!file) {
          receipt = null;
          if (nameEl) nameEl.textContent = "";
          return;
        }
        var reader = new FileReader();
        reader.onload = function (loadEvent) {
          receipt = {
            name: file.name,
            type: file.type,
            file: file,
            dataUrl: loadEvent.target.result
          };
          if (nameEl) nameEl.textContent = "Selected: " + file.name;
        };
        reader.readAsDataURL(file);
      });
    }

    bindReceiptInput("vcReceiptEp", "vcReceiptEpName");
    bindReceiptInput("vcReceiptJc", "vcReceiptJcName");
    bindReceiptInput("vcReceiptBank", "vcReceiptBankName");

    var placeButton = $("#vcPlaceOrder");
    if (placeButton) placeButton.addEventListener("click", placeOrder);
    if (mobilePlaceEl) mobilePlaceEl.addEventListener("click", placeOrder);

    var form = $("#vcCheckoutForm");
    if (form) {
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        placeOrder();
      });
    }
  }

  function renderPaymentOption(method, isActive) {
    return [
      '<label class="vc-checkout-pay' + (isActive ? " is-active" : "") + '">',
        '<input type="radio" name="vcPay" id="vcPay' + escapeAttr(method) + '" value="' + escapeAttr(method) + '"' + (isActive ? " checked" : "") + ">",
        "<div>",
          "<b>" + escapeHtml(paymentName(method)) + "</b>",
          "<span>" + escapeHtml(getPaymentDescription(method)) + "</span>",
        "</div>",
      "</label>"
    ].join("");
  }

  function getPaymentDescription(method) {
    if (method === "cod") return "Pay when your order arrives at your doorstep.";
    if (method === "easypaisa") return "Send payment via EasyPaisa, then upload your receipt.";
    if (method === "jazzcash") return "Send payment via JazzCash, then upload your receipt.";
    if (method === "bank") return "Transfer to our bank account, then upload your receipt.";
    return "Complete payment and upload proof below.";
  }

  function renderShippingOption(method, isActive, label, description) {
    return [
      '<label class="vc-checkout-ship' + (isActive ? " is-active" : "") + '">',
        '<input type="radio" name="vcShip" id="vcShip' + escapeAttr(method) + '" value="' + escapeAttr(method) + '"' + (isActive ? " checked" : "") + ">",
        "<div>",
          "<b>" + escapeHtml(label) + "</b>",
          "<span>" + escapeHtml(description) + "</span>",
        "</div>",
      "</label>"
    ].join("");
  }

  function render(cartData) {
    cart = cartData;
    var items = cart && Array.isArray(cart.items) ? cart.items : [];
    var computed = checkoutTotals(cart);
    var custom = hasCustomItems(items);
    var defaultPayment = custom ? "easypaisa" : "cod";
    var formattedTotal = formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix);

    if (totalEl) totalEl.textContent = formattedTotal;
    if (mobileTotalEl) mobileTotalEl.textContent = formattedTotal;

    if (!items.length) {
      renderEmpty();
      return;
    }

    setMobileBarVisible(true);

    root.innerHTML = [
      '<div class="vc-checkout-shell">',
        '<form class="vc-checkout-form" id="vcCheckoutForm" novalidate>',
          '<div class="vc-checkout-section">',
            "<h3>Delivery details</h3>",
            '<div class="vc-checkout-grid">',
              '<div class="vc-checkout-field"><label for="vcFn">First name *</label><input id="vcFn" type="text" autocomplete="given-name"></div>',
              '<div class="vc-checkout-field"><label for="vcLn">Last name *</label><input id="vcLn" type="text" autocomplete="family-name"></div>',
              '<div class="vc-checkout-field"><label for="vcPhone">WhatsApp / phone *</label><input id="vcPhone" type="tel" autocomplete="tel"></div>',
              '<div class="vc-checkout-field"><label for="vcEmail">Email (optional)</label><input id="vcEmail" type="email" autocomplete="email"></div>',
              '<div class="vc-checkout-field is-full"><label for="vcAddress">Complete address *</label><input id="vcAddress" type="text" autocomplete="street-address"></div>',
              '<div class="vc-checkout-field is-full"><label for="vcCity">City *</label><input id="vcCity" type="text" autocomplete="address-level2"></div>',
              '<div class="vc-checkout-field is-full"><label for="vcNote">Order notes (optional)</label><textarea id="vcNote" placeholder="Delivery instructions, gift message, etc."></textarea></div>',
            "</div>",
          "</div>",
          '<div class="vc-checkout-section">',
            "<h3>Shipping method</h3>",
            '<div class="vc-checkout-shipping" id="vcCoShipping">',
              renderShippingOption("normal", true, "Normal Delivery", "Flat Rs. 300 all over Pakistan."),
              renderShippingOption("urgent", false, "Urgent Delivery", "Priority delivery support for Rs. 500."),
            "</div>",
          "</div>",
          '<div class="vc-checkout-section">',
            "<h3>Payment method</h3>",
            '<div class="vc-checkout-payments" id="vcCoPayments">',
              renderPaymentOption("cod", !custom && defaultPayment === "cod"),
              renderPaymentOption("easypaisa", defaultPayment === "easypaisa"),
              renderPaymentOption("jazzcash", defaultPayment === "jazzcash"),
              renderPaymentOption("bank", defaultPayment === "bank"),
            "</div>",
            '<div class="vc-checkout-bank' + (defaultPayment !== "cod" ? " is-visible" : "") + '" id="vcCoBankDetails">',
              "<strong>Bank / wallet details</strong><br>",
              "Account Title For Bank Transfer: Muhammad Ahsan<br>",
              "Bank: Meezan Bank<br>",
              "Account #: 01234567890123<br>",
              "Account Title For Easy Paisa Jazz Cash: Ayaz Ali<br>",
              "JazzCash / EasyPaisa: 0301-11110679 / 0333-2929254",
            "</div>",
            '<div class="vc-checkout-receipt' + (defaultPayment === "easypaisa" ? " is-visible" : "") + '" id="vcReceiptEpWrap">',
              '<label for="vcReceiptEp">EasyPaisa receipt</label>',
              '<input id="vcReceiptEp" type="file" accept="image/*,.pdf">',
              '<div class="vc-checkout-receipt-name" id="vcReceiptEpName"></div>',
            "</div>",
            '<div class="vc-checkout-receipt' + (defaultPayment === "jazzcash" ? " is-visible" : "") + '" id="vcReceiptJcWrap">',
              '<label for="vcReceiptJc">JazzCash receipt</label>',
              '<input id="vcReceiptJc" type="file" accept="image/*,.pdf">',
              '<div class="vc-checkout-receipt-name" id="vcReceiptJcName"></div>',
            "</div>",
            '<div class="vc-checkout-receipt' + (defaultPayment === "bank" ? " is-visible" : "") + '" id="vcReceiptBankWrap">',
              '<label for="vcReceiptBank">Bank transfer receipt</label>',
              '<input id="vcReceiptBank" type="file" accept="image/*,.pdf">',
              '<div class="vc-checkout-receipt-name" id="vcReceiptBankName"></div>',
            "</div>",
          "</div>",
        "</form>",
        renderSummary(items, computed),
      "</div>"
    ].join("");

    setupPayments();
    enforcePaymentRules();
  }

  function renderSummary(items, computed) {
    return [
      '<aside class="vc-checkout-summary">',
        "<h3>Order summary</h3>",
        '<div class="vc-order-list">',
          items.map(function (item) { return renderItem(item, computed.minor, computed.prefix); }).join(""),
        "</div>",
        computed.freeShipping
          ? '<p class="vc-checkout-free-note" id="vcCoFreeShippingNote">You qualify for free shipping.</p>'
          : '<p class="vc-checkout-free-note" id="vcCoFreeShippingNote" hidden>You qualify for free shipping.</p>',
        '<div class="vc-checkout-row"><span>Subtotal</span><span>' + formatMoney(computed.subtotalRaw, computed.minor, computed.prefix) + "</span></div>",
        computed.discount > 0
          ? '<div class="vc-checkout-row is-discount"><span>Discount</span><span>− ' + formatMoney(computed.discountRaw, computed.minor, computed.prefix) + "</span></div>"
          : "",
        '<div class="vc-checkout-row"><span>Shipping</span><span id="vcCoShippingAmount">' +
          (computed.shipping > 0
            ? formatMoney(Math.round(computed.shipping * Math.pow(10, computed.minor)), computed.minor, computed.prefix)
            : "Free") +
        "</span></div>",
        computed.tax > 0
          ? '<div class="vc-checkout-row"><span>Tax</span><span>' +
              formatMoney(Math.round(computed.tax * Math.pow(10, computed.minor)), computed.minor, computed.prefix) +
            "</span></div>"
          : "",
        '<div class="vc-checkout-row total"><span>Total</span><span id="vcCoTotalAmount">' +
          formatMoney(Math.round(computed.total * Math.pow(10, computed.minor)), computed.minor, computed.prefix) +
        "</span></div>",
        '<div class="vc-checkout-actions">',
          '<button class="vc-checkout-submit" type="button" id="vcPlaceOrder">Place Order</button>',
          '<a class="vc-checkout-back" href="' + CART + '">Back to cart</a>',
        "</div>",
      "</aside>"
    ].join("");
  }

  function renderItem(item, minor, prefix) {
    var image = item.images && item.images[0] ? item.images[0].src : "";
    return [
      '<article class="vc-order-item">',
        '<div class="vc-order-img">',
          image ? '<img src="' + escapeAttr(image) + '" alt="' + escapeAttr(item.name || "Product") + '">' : "",
        "</div>",
        "<div>",
          '<h4 class="vc-order-name">' + escapeHtml(item.name || "Product") + "</h4>",
          '<div class="vc-order-meta">' + escapeHtml(formatItemMetaInline(item)) + "</div>",
        "</div>",
        '<div class="vc-order-price">' + formatMoney(item.totals && item.totals.line_total, minor, prefix) + "</div>",
      "</article>"
    ].join("");
  }

  function renderEmpty() {
    if (totalEl) totalEl.textContent = "—";
    if (mobileTotalEl) mobileTotalEl.textContent = "—";
    setMobileBarVisible(false);
    root.innerHTML = [
      '<div class="vc-checkout-empty">',
        "<h3>Your cart is empty</h3>",
        "<p>Add products to your cart before checkout.</p>",
        '<a href="' + SHOP + '">Start Shopping</a>',
      "</div>"
    ].join("");
  }

  function renderSuccess(order) {
    var orderId = order && (order.order_id || order.id || order.order_number)
      ? (order.order_id || order.id || order.order_number)
      : "";
    setMobileBarVisible(false);
    root.innerHTML = [
      '<div class="vc-checkout-empty">',
        "<h3>Order confirmed</h3>",
        "<p>" +
          (orderId ? "Order #" + escapeHtml(String(orderId)) + " has been placed successfully. " : "Your order has been placed successfully. ") +
          "Use WhatsApp below if you want a quicker response from our team." +
        "</p>",
        '<button class="vc-checkout-whatsapp" type="button" id="vcSuccessWhatsApp">Send WhatsApp message</button>',
        '<a class="vc-checkout-back" href="' + SHOP + '" style="margin-top:12px">Continue Shopping</a>',
      "</div>"
    ].join("");

    var successWa = document.getElementById("vcSuccessWhatsApp");
    if (successWa) {
      successWa.addEventListener("click", sendPendingWhatsApp);
    }
  }

  function formatMoney(raw, minor, prefix) {
    var value = Number(raw || 0) / Math.pow(10, minor);
    return prefix + value.toLocaleString("en-PK", {
      minimumFractionDigits: minor > 0 ? 2 : 0,
      maximumFractionDigits: minor > 0 ? 2 : 0
    }).replace(/\.00$/, "");
  }

  function escapeHtml(value) {
    return String(value || "").replace(/[&<>"']/g, function (character) {
      return {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[character];
    });
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, "&#96;");
  }

  setMobileBarVisible(false);

  fetchCart()
    .then(render)
    .catch(function () {
      setMobileBarVisible(false);
      root.innerHTML =
        '<div class="vc-checkout-empty"><h3>Could not load checkout</h3><p>Please refresh the page or return to your cart.</p><a href="' +
        CART +
        '">Back to cart</a></div>';
    });
})();
</script>
